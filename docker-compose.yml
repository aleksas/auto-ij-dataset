services:
  auto-dataset-runner:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    user: "${AUTO_DATASET_UID:-1000}:${AUTO_DATASET_GID:-1000}"
    environment:
      HOME: /tmp/codex-home
      GEMINI_CLI_HOME: /tmp/gemini-home
      HF_TOKEN: "${HF_TOKEN}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      AUTO_DATASET_GITHUB_TOKEN: "${AUTO_DATASET_GITHUB_TOKEN:-}"
      AUTO_DATASET_MANIFEST: "${AUTO_DATASET_MANIFEST:-datasets/public-validation-v1/manifest.yaml}"
      AUTO_DATASET_MAX_RUNS: "${AUTO_DATASET_MAX_RUNS:-1}"
      AUTO_DATASET_RUN_SECONDS: "${AUTO_DATASET_RUN_SECONDS:-3600}"
      AUTO_DATASET_WORKER_TIMEOUT_SECONDS: "${AUTO_DATASET_WORKER_TIMEOUT_SECONDS:-900}"
      AUTO_DATASET_SLEEP_SECONDS: "${AUTO_DATASET_SLEEP_SECONDS:-720}"
      AUTO_DATASET_REPO_ID: "${AUTO_DATASET_REPO_ID:-aleksasp/auto-ij-dataset}"
      AUTO_DATASET_GIT_USER_NAME: "${AUTO_DATASET_GIT_USER_NAME:-Aleksas Pielikis}"
      AUTO_DATASET_GIT_USER_EMAIL: "${AUTO_DATASET_GIT_USER_EMAIL:-ant.kampo@gmail.com}"
      AUTO_DATASET_CODEX_MODEL: "${AUTO_DATASET_CODEX_MODEL:-gpt-5.4}"
      AUTO_DATASET_CODEX_REASONING_EFFORT: "${AUTO_DATASET_CODEX_REASONING_EFFORT:-medium}"
      AUTO_DATASET_CODEX_EXTRA_ARGS: "${AUTO_DATASET_CODEX_EXTRA_ARGS:-}"
      AUTO_DATASET_GEMINI_MODEL: "${AUTO_DATASET_GEMINI_MODEL:-gemini-2.0-pro}"
      AUTO_DATASET_GEMINI_EXTRA_ARGS: "${AUTO_DATASET_GEMINI_EXTRA_ARGS:-}"
      AUTO_DATASET_PUBLISH_EVERY: "${AUTO_DATASET_PUBLISH_EVERY:-1}"
      AUTO_DATASET_SKIP_PUBLISH: "${AUTO_DATASET_SKIP_PUBLISH:-0}"
    volumes:
      - .:/app
      - ${HOME}/.codex:/tmp/codex-home/.codex:ro
      - ${HOME}/.gemini:/tmp/gemini-home/.gemini:ro
    command: ["/app/scripts/run-autonomous.sh"]
