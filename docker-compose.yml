services:
  auto-dataset-runner:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    user: "${AUTO_DATASET_UID:-1000}:${AUTO_DATASET_GID:-1000}"
    environment:
      HOME: /tmp/codex-home
      HF_TOKEN: "${HF_TOKEN}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      AUTO_DATASET_MANIFEST: "${AUTO_DATASET_MANIFEST:-datasets/public-validation-v1/manifest.yaml}"
      AUTO_DATASET_MAX_RUNS: "${AUTO_DATASET_MAX_RUNS:-50}"
      AUTO_DATASET_RUN_SECONDS: "${AUTO_DATASET_RUN_SECONDS:-3600}"
      AUTO_DATASET_WORKER_TIMEOUT_SECONDS: "${AUTO_DATASET_WORKER_TIMEOUT_SECONDS:-60}"
      AUTO_DATASET_SLEEP_SECONDS: "${AUTO_DATASET_SLEEP_SECONDS:-10}"
      AUTO_DATASET_REPO_ID: "${AUTO_DATASET_REPO_ID:-aleksasp/auto-ij-dataset}"
      AUTO_DATASET_CODEX_MODEL: "${AUTO_DATASET_CODEX_MODEL:-gpt-5.2}"
      AUTO_DATASET_CODEX_EXTRA_ARGS: "${AUTO_DATASET_CODEX_EXTRA_ARGS:-}"
      AUTO_DATASET_PUBLISH_EVERY: "${AUTO_DATASET_PUBLISH_EVERY:-3}"
      AUTO_DATASET_SKIP_PUBLISH: "${AUTO_DATASET_SKIP_PUBLISH:-0}"
    volumes:
      - .:/app
      - ${HOME}/.codex:/tmp/codex-home/.codex:ro
    command: ["/app/scripts/run-autonomous.sh"]
