    \n1/3\n\nJO/S S40\n26/02/2021\n100163-2021-FR\n\n2/3\n\nValeur hors TVA: 297 180.20 EUR\nII.2)\n\nDescription\n\nII.2.3)\n\nLieu d'ex\xE9cution\nCode NUTS: BE332 Arr. Li\xE8ge\nLieu principal d'ex\xE9cution:\nCommune de Chaudfontaine.\n\nII.2.4)\n\nDescription des prestations:\nClassement et archivage des dossiers administratifs de la Commune et du CPAS de Chaudfontaine sur base du\nsyst\xE8me Decasepel et fourniture du mat\xE9riel destin\xE9 au classement et \xE0 l'archivage des documents.\nme\n\nVisite: le soumissionnaire prendra rendez-vous pour effectuer une visite des lieux avec M\n(043615538 \u2013 sabine.gathot@chaudfontaine.be ) sous peine de nullit\xE9 de l'offre.\n\nSabine Gathot\n\nII.2.5)\n\nCrit\xE8res d\u2019attribution\nPrix\n\nII.2.11)\n\nInformation sur les options\nOptions: non\n\nII.2.13)\n\nInformation sur les fonds de l'Union europ\xE9enne\nLe contrat s'inscrit dans un projet/programme financ\xE9 par des fonds de l'Union europ\xE9enne: non\n\nII.2.14)\n\nInformations\
    \ compl\xE9mentaires\n\nSection IV: Proc\xE9dure\nIV.1)\nDescription\nIV.1.1)\n\nType de proc\xE9dure\nProc\xE9dure ouverte\n\nIV.1.3)\n\nInformation sur l'accord-cadre ou le syst\xE8me d'acquisition dynamique\n\nIV.1.8)\n\nInformation concernant l\u2019accord sur les march\xE9s publics (AMP)\nLe march\xE9 est couvert par l'accord sur les march\xE9s publics: oui\n\nIV.2)\n\nRenseignements d'ordre administratif\n\nIV.2.1)\n\nPublication ant\xE9rieure relative \xE0 la pr\xE9sente proc\xE9dure\nNum\xE9ro de l'avis au JO s\xE9rie S: 2020/S 203-493663\n\nIV.2.8)\n\nInformations sur l'abandon du syst\xE8me d'acquisition dynamique\n\nIV.2.9)\n\nInformations sur l'abandon de la proc\xE9dure d'appel \xE0 la concurrence sous la forme d'un avis de\npr\xE9information\n\nSection V: Attribution du march\xE9\nMarch\xE9 n\xBA: DG2018/847\nIntitul\xE9:\nClassement et archivage des dossiers administratifs sur base du syst\xE8me Decasepel\nUn march\xE9/lot est attribu\xE9: oui\nV.2)\n\nAttribution du march\xE9\
    \n\nV.2.1)\n\nDate de conclusion du march\xE9:\n20/01/2021\n\nV.2.2)\n\nInformations sur les offres\nNombre d'offres re\xE7ues: 2\nNombre d'offres re\xE7ues de la part de PME: 2\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n2/3\n\nJO/S S40\n26/02/2021\n100163-2021-FR\n\n3/3\n\nNombre d'offres re\xE7ues de la part de soumissionnaires d'autres \xC9tats membres de l'UE: 0\nNombre d'offres re\xE7ues de la part de soumissionnaires d'\xC9tats non membres de l'UE: 0\nNombre d'offres re\xE7ues par voie \xE9lectronique: 2\nLe march\xE9 a \xE9t\xE9 attribu\xE9 \xE0 un groupement d'op\xE9rateurs \xE9conomiques: non\nV.2.3)\n\nNom et adresse du titulaire\nNom officiel: Mahut & Fils SPRL\nAdresse postale: Boulevard Eisenhower 69B\nVille: Tournai\nCode NUTS: BE BELGIQUE-BELGI\xCB\nCode postal: 7500\nPays: Belgique\nCourriel: sprl.mahut@skynet.be\nT\xE9l\xE9phone: +32 69223462\nFax: +32 69227261\nLe titulaire est une PME: oui\n\nV.2.4)\n\nInformations sur le montant du march\xE9/du lot (hors TVA)\n\
    Valeur totale du march\xE9/du lot: 297 180.20 EUR\n\nV.2.5)\n\nInformation sur la sous-traitance\n\nSection VI: Renseignements compl\xE9mentaires\nVI.3)\nInformations compl\xE9mentaires:\nVI.4)\n\nProc\xE9dures de recours\n\nVI.4.1)\n\nInstance charg\xE9e des proc\xE9dures de recours\nNom officiel: Tribunal de Li\xE8ge\nVille: Li\xE8ge\nCode postal: 4000\nPays: Belgique\n\nVI.5)\n\nDate d\u2019envoi du pr\xE9sent avis:\n23/02/2021\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n3/3\n```\n"
