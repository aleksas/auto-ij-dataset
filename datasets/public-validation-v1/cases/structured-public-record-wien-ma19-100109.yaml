  content_markdown: "# Vienna Gebaut exhibition services contract extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/de/notice/100109-2021/pdfs\n\n## Listed sources\n- TED notice XML 100109-2021: https://ted.europa.eu/en/notice/100109-2021/xml\n- TED notice PDF 100109-2021 (DE): https://ted.europa.eu/de/notice/100109-2021/pdfs\n- TED notice detail 100109-2021: https://ted.europa.eu/en/notice/-/detail/100109-2021\n\n## Extracted source text\n\n```text\nABl./S S40\n26/02/2021\n100109-2021-DE\n\n1/3\n\nDiese Bekanntmachung auf der TED-Website: https://ted.europa.eu/udl?uri=TED:NOTICE:100109-2021:TEXT:DE:HTML\n\n\xD6sterreich-Wien: Veschiedene Dienstleistungen f\xFCr Unternehmen und andere Dienstleistungen\n2021/S 040-100109\nBekanntmachung vergebener Auftr\xE4ge\nErgebnisse des Vergabeverfahrens\nDienstleistungen\nRechtsgrundlage:\nRichtlinie 2014/24/EU\nAbschnitt I: \xD6ffentlicher Auftraggeber\nI.1)\nName und Adressen\n\
    Offizielle Bezeichnung: Magistrat der Stadt Wien \u2014 Magistratsabteilung 19\nNationale Identifikationsnummer: 9110020116399\nPostanschrift: Niederhofstra\xDFe 23\nOrt: Wien\nNUTS-Code: AT13 Wien\nPostleitzahl: 1120\nLand: \xD6sterreich\nE-Mail: vergaben@ma19.wien.gv.at\nTelefon: +43 1400088916\nFax: +43 140009988910\nInternet-Adresse(n):\nHauptadresse: http://www.wien.gv.at/stadtentwicklung/architektur/index.html\nI.4)\n\nArt des \xF6ffentlichen Auftraggebers\nRegional- oder Kommunalbeh\xF6rde\n\nI.5)\n\nHauptt\xE4tigkeit(en)\nAllgemeine \xF6ffentliche Verwaltung\n\nAbschnitt II: Gegenstand\nII.1)\nUmfang der Beschaffung\nII.1.1)\n\nBezeichnung des Auftrags:\nGebaut 2020 \u2014 2025\nReferenznummer der Bekanntmachung: M19 623264-2020\n\nII.1.2)\n\nCPV-Code Hauptteil\n79900000 Veschiedene Dienstleistungen f\xFCr Unternehmen und andere Dienstleistungen\n\nII.1.3)\n\nArt des Auftrags\nDienstleistungen\n\nII.1.4)\n\nKurze Beschreibung:\nOrganisation der Ausstellung Gebaut 2020-2025.\n\
    \nII.1.6)\n\nAngaben zu den Losen\nAufteilung des Auftrags in Lose: nein\n\nII.1.7)\n\nGesamtwert der Beschaffung (ohne MwSt.)\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n1/3\n\nABl./S S40\n26/02/2021\n100109-2021-DE\n\n2/3\n\nWert ohne MwSt.: 195 676.99 EUR\nII.2)\n\nBeschreibung\n\nII.2.2)\n\nWeitere(r) CPV-Code(s)\n79900000 Veschiedene Dienstleistungen f\xFCr Unternehmen und andere Dienstleistungen\n\nII.2.3)\n\nErf\xFCllungsort\nNUTS-Code: AT130 Wien\nHauptort der Ausf\xFChrung:\n\nII.2.4)\n\nBeschreibung der Beschaffung:\nErstellen eines Konzepts, eines Layouts und Handouts f\xFCr die Ausstellung \u201EGebaut\u201C. Versenden eines Aufrufes\nzur Einreichung. (Der aktuelle Styleguide der Stadt Wien ist generell in analogen und digitalen Formaten zu\nber\xFCcksichtigen).\nGestaltung der j\xE4hrlich 27 Ausstellungstafeln \u201EGebaut\u201C und die Montage dieser Plakate in das schon\nvorhandene H\xE4ngesystem. 5 Jahre (2021- 2025).\nOrganisation der j\xE4hrlichen Ausstellung \u201E\
    Gebaut\u201C - Jury, Architekturtouren, Fotos, Er\xF6ffnung, Catering,\nM\xF6blierung, Moderation, Internet, App, Nachbearbeitung, organisatorische Betreuung der Fotografen, bzw. der\nFotorechte. 5 Jahre (2021- 2025).\nJ\xE4hrliche Gestaltung der Ausstellungstafeln f\xFCr die Dezernate der Abteilung f\xFCr Architektur und Stadtgestaltung.\n5 Jahre (2021- 2025) J\xE4hrlich sind ca. 10-15 Dezernatstafeln neu zu gestalten.\nGestaltung des Sammelkataloges \u201EGebaut 2020- 2025\u201C mit den ausgestellten Projekten der Jahre 2020-2024.\nPublikation w\xE4hrend der Gebaut- Ausstellungser\xF6ffnung im Jahr 2025.\n\nII.2.5)\n\nZuschlagskriterien\nQualit\xE4tskriterium - Name: Art und \xC4hnlichkeit des Referenzprojekes mit der Aufgabenstellung, Bezug zu\narchitektonischen Themen / Gewichtung: 2 Punkte\nQualit\xE4tskriterium - Name: Innovative und zeitgem\xE4\xDFe Pr\xE4sentation der Inhalte im architektonischen Kontext /\nGewichtung: 4 Punkte\nQualit\xE4tskriterium - Name: Wirtschaftlicher\
    \ und nachhaltiger Umgang mit den ben\xF6tigten Materialien /\nGewichtung: 2 Punkte\nQualit\xE4tskriterium - Name: Ausstellungskatalog, Folder (Handout) / Gewichtung: 6 Punkte\nQualit\xE4tskriterium - Name: Gestaltung der Ausstellung; Kompatibilit\xE4t mit der medialen Pr\xE4senz der Architektur\nund Stadtgestaltung / Gewichtung: 4 Punkte\nPreis - Gewichtung: 9 Punkte\n\nII.2.11)\n\nAngaben zu Optionen\nOptionen: nein\n\nII.2.13)\n\nAngaben zu Mitteln der Europ\xE4ischen Union\nDer Auftrag steht in Verbindung mit einem Vorhaben und/oder Programm, das aus Mitteln der EU finanziert\nwird: nein\n\nII.2.14)\n\nZus\xE4tzliche Angaben\n\nAbschnitt IV: Verfahren\nIV.1)\nBeschreibung\nIV.1.1)\n\nVerfahrensart\nVerhandlungsverfahren\n\nIV.1.3)\n\nAngaben zur Rahmenvereinbarung oder zum dynamischen Beschaffungssystem\n\nIV.1.8)\n\nAngaben zum Beschaffungs\xFCbereinkommen (GPA)\nDer Auftrag f\xE4llt unter das Beschaffungs\xFCbereinkommen: nein\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n2/3\n\
    \nABl./S S40\n26/02/2021\n100109-2021-DE\n\nIV.2)\n\nVerwaltungsangaben\n\nIV.2.1)\n\nFr\xFChere Bekanntmachung zu diesem Verfahren\nBekanntmachungsnummer im ABl.: 2020/S 190-458888\n\nIV.2.8)\n\nAngaben zur Beendigung des dynamischen Beschaffungssystems\n\nIV.2.9)\n\nAngaben zur Beendigung des Aufrufs zum Wettbewerb in Form einer Vorinformation\n\n3/3\n\nAbschnitt V: Auftragsvergabe\nEin Auftrag/Los wurde vergeben: ja\nV.2)\n\nAuftragsvergabe\n\nV.2.1)\n\nTag des Vertragsabschlusses:\n15/02/2021\n\nV.2.2)\n\nAngaben zu den Angeboten\nAnzahl der eingegangenen Angebote: 3\nDer Auftrag wurde an einen Zusammenschluss aus Wirtschaftsteilnehmern vergeben: nein\n\nV.2.3)\n\nName und Anschrift des Wirtschaftsteilnehmers, zu dessen Gunsten der Zuschlag erteilt wurde\nOffizielle Bezeichnung: MVD Austria, Verein zur F\xF6rderung von Kunst, Architektur, Musik und Film\nNationale Identifikationsnummer: 9110018794288\nOrt: Wien\nNUTS-Code: AT \xD6STERREICH\nLand: \xD6sterreich\nE-Mail: mvd@mvd.org\n\
    Der Auftragnehmer ist ein KMU: ja\n\nV.2.4)\n\nAngaben zum Wert des Auftrags/Loses (ohne MwSt.)\nGesamtwert des Auftrags/Loses: 195 676.99 EUR\n\nV.2.5)\n\nAngaben zur Vergabe von Unterauftr\xE4gen\n\nAbschnitt VI: Weitere Angaben\nVI.3)\nZus\xE4tzliche Angaben:\nVI.4)\n\nRechtsbehelfsverfahren/Nachpr\xFCfungsverfahren\n\nVI.4.1)\n\nZust\xE4ndige Stelle f\xFCr Rechtsbehelfs-/Nachpr\xFCfungsverfahren\nOffizielle Bezeichnung: Verwaltungsgericht Wien\nOrt: Wien\nPostleitzahl: 1190\nLand: \xD6sterreich\nE-Mail: post@vwg.wien.gv.at\nInternet-Adresse: www.verwaltungsgericht.wien.gv.at\n\nVI.4.3)\n\nEinlegung von Rechtsbehelfen\nGenaue Angaben zu den Fristen f\xFCr die Einlegung von Rechtsbehelfen:\n\nVI.5)\n\nTag der Absendung dieser Bekanntmachung:\n22/02/2021\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n3/3\n```\n"
