  content_markdown: "# Comune di Ancona municipal treasury services contract extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/it/notice/100008-2021/pdfs\n\n## Listed sources\n- TED notice XML 100008-2021: https://ted.europa.eu/en/notice/100008-2021/xml\n- TED notice PDF 100008-2021 (IT): https://ted.europa.eu/it/notice/100008-2021/pdfs\n- TED notice detail 100008-2021: https://ted.europa.eu/en/notice/-/detail/100008-2021\n\n## Extracted source text\n\n```text\nGU/S S40\n26/02/2021\n100008-2021-IT\n\n1/4\n\nAvviso nel sito web TED: https://ted.europa.eu/udl?uri=TED:NOTICE:100008-2021:TEXT:IT:HTML\n\nItalia-Ancona: Servizi finanziari e assicurativi\n2021/S 040-100008\nAvviso di aggiudicazione di appalto\nRisultati della procedura di appalto\nServizi\nBase giuridica:\nDirettiva 2014/24/UE\nSezione I: Amministrazione aggiudicatrice\nI.1)\nDenominazione e indirizzi\nDenominazione ufficiale: Comune di Ancona\nNumero di identificazione\
    \ nazionale: Direzione gare e appalti\nIndirizzo postale: largo XXIV Maggio 1\nCitt\xE0: Ancona\nCodice NUTS: ITI32 Ancona\nCodice postale: 60123\nPaese: Italia\nE-mail: marinella.monti@comune.ancona.it\nTel.: +39 0712222249\nFax: +39 0712222109\nIndirizzi Internet:\nIndirizzo principale: http://www.comune.ancona.gov.it\nIndirizzo del profilo di committente: http://www.comune.ancona.gov.it/ankonline/category/bandi-di-gara-econtratti/appalti-e-concessioni/\nI.4)\n\nTipo di amministrazione aggiudicatrice\nAutorit\xE0 regionale o locale\n\nI.5)\n\nPrincipali settori di attivit\xE0\nServizi generali delle amministrazioni pubbliche\n\nSezione II: Oggetto\nII.1)\nEntit\xE0 dell'appalto\nII.1.1)\n\nDenominazione:\nProcedura aperta telematica per l'affidamento del servizio di tesoreria comunale \u2014 CIG: 8232814D06\n\nII.1.2)\n\nCodice CPV principale\n66000000 Servizi finanziari e assicurativi\n\nII.1.3)\n\nTipo di appalto\nServizi\n\nII.1.4)\n\nBreve descrizione:\nL'affidamento riguarda la\
    \ gestione del servizio di tesoreria del comune di Ancona nei termini e con le specifiche\nindicate nello schema di convenzione.\n\nII.1.6)\n\nInformazioni relative ai lotti\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n1/4\n\nGU/S S40\n26/02/2021\n100008-2021-IT\n\n2/4\n\nQuesto appalto \xE8 suddiviso in lotti: no\nII.1.7)\n\nValore totale dell\u2019appalto (IVA esclusa)\nValore, IVA esclusa: 777 000.00 EUR\n\nII.2)\n\nDescrizione\n\nII.2.3)\n\nLuogo di esecuzione\nCodice NUTS: ITI32 Ancona\nLuogo principale di esecuzione:\nAncona\n\nII.2.4)\n\nDescrizione dell'appalto:\nIl servizio \xE8 stimato in complessive 770 000,00 EUR, oltre IVA per la durata di 60 mesi e per la possibile proroga\ndi un anno (129 500,00 EUR). Il valore tiene conto di un canone annuo di 80 000 EUR.\n\nII.2.5)\n\nCriteri di aggiudicazione\nCriterio di qualit\xE0 - Nome: offerta tecnica / Ponderazione: 70\nPrezzo - Ponderazione: 30\n\nII.2.11)\n\nInformazioni relative alle opzioni\nOpzioni: s\xEC\nDescrizione\
    \ delle opzioni:\n\xC8 prevista l'opzione di proroga per 12 mesi per consentire lo svolgimento della nuova procedura di gara.\n\nII.2.13)\n\nInformazioni relative ai fondi dell'Unione europea\nL'appalto \xE8 connesso ad un progetto e/o programma finanziato da fondi dell'Unione europea: no\n\nII.2.14)\n\nInformazioni complementari\n\nSezione IV: Procedura\nIV.1)\nDescrizione\nIV.1.1)\n\nTipo di procedura\nProcedura aperta\n\nIV.1.3)\n\nInformazioni su un accordo quadro o un sistema dinamico di acquisizione\n\nIV.1.8)\n\nInformazioni relative all'accordo sugli appalti pubblici (AAP)\nL'appalto \xE8 disciplinato dall'accordo sugli appalti pubblici: s\xEC\n\nIV.2)\n\nInformazioni di carattere amministrativo\n\nIV.2.1)\n\nPubblicazione precedente relativa alla stessa procedura\nNumero dell'avviso nella GU S: 2020/S 061-145753\n\nIV.2.8)\n\nInformazioni relative alla chiusura del sistema dinamico di acquisizione\n\nIV.2.9)\n\nInformazioni relative alla fine della validit\xE0 dell'avviso di\
    \ indizione di gara in forma di avviso di\npreinformazione\n\nSezione V: Aggiudicazione di appalto\nContratto d'appalto n.: 14902\nDenominazione:\nAffidamento servizio di tesoreria comunale\nUn contratto d'appalto/lotto \xE8 stato aggiudicato: s\xEC\nV.2)\n\nAggiudicazione di appalto\n\nV.2.1)\n\nData di conclusione del contratto d'appalto:\n19/02/2021\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n2/4\n\nGU/S S40\n26/02/2021\n100008-2021-IT\n\nV.2.2)\n\nInformazioni sulle offerte\nNumero di offerte pervenute: 4\nNumero di offerte ricevute da PMI: 0\nNumero di offerte ricevute da offerenti provenienti da altri Stati membri dell'UE: 0\nNumero di offerte ricevute dagli offerenti provenienti da Stati non membri dell'UE: 0\nNumero di offerte pervenute per via elettronica: 4\nL'appalto \xE8 stato aggiudicato a un raggruppamento di operatori economici: no\n\nV.2.3)\n\nNome e indirizzo del contraente\nDenominazione ufficiale: Intesa Sanpaolo SpA\nCitt\xE0: Torino\nCodice NUTS: ITC11 Torino\n\
    Paese: Italia\nIl contraente \xE8 una PMI: no\n\nV.2.4)\n\nInformazione sul valore del contratto d'appalto /lotto (IVA esclusa)\nValore totale inizialmente stimato del contratto d\u2019appalto/lotto: 647 500.00 EUR\nValore totale del contratto d'appalto/del lotto: 324 500.00 EUR\n\nV.2.5)\n\nInformazioni sui subappalti\n\n3/4\n\nSezione VI: Altre informazioni\nVI.3)\nInformazioni complementari:\nVI.4)\n\nProcedure di ricorso\n\nVI.4.1)\n\nOrganismo responsabile delle procedure di ricorso\nDenominazione ufficiale: Tribunale amministrativo Regione Marche\nIndirizzo postale: via della Loggia 24\nCitt\xE0: Ancona\nCodice postale: 60121\nPaese: Italia\nE-mail: taran-segrprotocolloamm@ga-cert.it\nTel.: +39 071-206946\nFax: +39 071203853\nIndirizzo Internet: http://www.giustizia-amministrativa.it\n\nVI.4.3)\n\nProcedure di ricorso\nInformazioni dettagliate sui termini di presentazione dei ricorsi:\nTermini di cui all'art. 204 del D.Lgs. n. 50/2016 s.m.i.\n\nVI.4.4)\n\nServizio presso il quale\
    \ sono disponibili informazioni sulle procedure di ricorso\nDenominazione ufficiale: Direzione gare e appalti\nIndirizzo postale: largo XXIV Maggio 1\nCitt\xE0: Ancona\nCodice postale: 60121\nPaese: Italia\nE-mail: marinella.monti@comune.ancona.it\nTel.: +39 0712222249\nFax: +39 0712222109\nIndirizzo Internet: http://www.comune.ancona.gov.it\n\nVI.5)\n\nData di spedizione del presente avviso:\n22/02/2021\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n3/4\n\nGU/S S40\n26/02/2021\n100008-2021-IT\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n4/4\n\n4/4\n```\n"
