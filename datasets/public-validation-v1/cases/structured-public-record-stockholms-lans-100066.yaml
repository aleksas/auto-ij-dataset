  content_markdown: "# Stockholm psychiatry staff supervision contract extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/sv/notice/100066-2021/pdfs\n\n## Listed sources\n- TED notice XML 100066-2021: https://ted.europa.eu/en/notice/100066-2021/xml\n- TED notice PDF 100066-2021 (SV): https://ted.europa.eu/sv/notice/100066-2021/pdfs\n- TED notice detail 100066-2021: https://ted.europa.eu/en/notice/-/detail/100066-2021\n\n## Extracted source text\n\n```text\nEUT/S S40\n26/02/2021\n100066-2021-SV\n\n1/3\n\nDetta meddelande p\xE5 webbplatsen TED: https://ted.europa.eu/udl?uri=TED:NOTICE:100066-2021:TEXT:SV:HTML\n\nSverige-Stockholm: Handledning\n2021/S 040-100066\nMeddelande om tilldelning av kontrakt\nResultat av upphandlingsf\xF6rfarandet\nTj\xE4nster\nR\xE4ttslig grund:\ndirektiv 2014/24/EU\nAvsnitt I: Upphandlande myndighet\nI.1)\nNamn och adresser\nOfficiellt namn: Stockholms l\xE4ns sjukv\xE5rdsomr\xE5de\nNationellt\
    \ registreringsnummer: 232100-0016\nPostadress: Box 454 36\nOrt: Stockholm\nNuts-kod: SE110 Stockholms l\xE4n\nPostnummer: 104 31\nLand: Sverige\nKontaktperson: Lars G\xF6ran Sundman\nE-post: lars-goran.sundman@sll.se\nInternetadress(er):\nAllm\xE4n adress: http://www.slso.sll.se\nI.4)\n\nTyp av upphandlande myndighet\nDepartement eller annan central, regional eller lokal statlig myndighet\n\nI.5)\n\nHuvudsaklig verksamhet\nH\xE4lso- och sjukv\xE5rd\n\nAvsnitt II: F\xF6rem\xE5l\nII.1)\nUpphandlingens omfattning\nII.1.1)\n\nBen\xE4mning p\xE5 upphandlingen:\nHandledning till personal - Dynamiskt ink\xF6pssystem\nReferensnummer: SLSO 19-910\n\nII.1.2)\n\nHuvudsaklig CPV-kod\n80590000 Handledning\n\nII.1.3)\n\nTyp av kontrakt\nTj\xE4nster\n\nII.1.4)\n\nKort beskrivning:\nStockholms l\xE4ns sjukv\xE5rdsomr\xE5de avser att upphandla handledning till personal inom psykiatrin. Det dynamiska\nink\xF6pssystemet g\xF6r det m\xF6jligt f\xF6r leverant\xF6rer att ansluta och avsluta sin medverkan\
    \ i systemet under hela\ndess giltighetstid.\n\nII.1.6)\n\nInformation om delar\nKontraktet \xE4r uppdelat i flera delar: nej\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n1/3\n\nEUT/S S40\n26/02/2021\n100066-2021-SV\n\n2/3\n\nII.1.7)\n\nUpphandlingens totala v\xE4rde (exkl. moms)\nV\xE4rde exkl. moms: 75 000.00 SEK\n\nII.2)\n\nBeskrivning\n\nII.2.2)\n\nYtterligare CPV-kod(er)\n85100000 H\xE4lsov\xE5rdstj\xE4nster\n\nII.2.3)\n\nPlats f\xF6r utf\xF6rande\nNuts-kod: SE110 Stockholms l\xE4n\n\nII.2.4)\n\nBeskrivning av upphandlingen:\nStockholms l\xE4ns sjukv\xE5rdsomr\xE5de avser att upphandla handledning till personal inom psykiatrin. Det dynamiska\nink\xF6pssystemet g\xF6r det m\xF6jligt f\xF6r leverant\xF6rer att ansluta och avsluta sin medverkan i systemet under hela\ndess giltighetstid.\n\nII.2.5)\n\nTilldelningskriterier\nPris\n\nII.2.11)\n\nInformation om optioner\nOption: nej\n\nII.2.13)\n\nInformation om EU-medel\nKontraktet \xE4r knutet till projekt och/eller program som finansieras\
    \ med EU-medel: nej\n\nII.2.14)\n\nKompletterande upplysningar\n\nAvsnitt IV: F\xF6rfarande\nIV.1)\nBeskrivning\nIV.1.1)\n\nTyp av f\xF6rfarande\nSelektivt f\xF6rfarande\n\nIV.1.3)\n\nInformation om ramavtal eller dynamiskt ink\xF6pssystem\nEtt dynamiskt ink\xF6pssystem har installerats\n\nIV.1.8)\n\nInformation om avtalet om offentlig upphandling\nUpphandlingen omfattas av avtalet om offentlig upphandling: ja\n\nIV.2)\n\nAdministrativ information\n\nIV.2.1)\n\nTidigare offentligg\xF6rande ang\xE5ende detta f\xF6rfarande\nMeddelandenummer i EUT: 2019/S 197-478728\n\nIV.2.8)\n\nInformation om avslutande av det dynamiska ink\xF6pssystemet\n\nIV.2.9)\n\nInformation om avslutande av anbudsinfordran i form av ett f\xF6rhandsmeddelande\n\nAvsnitt V: Kontraktstilldelning\nEtt kontrakt/delkontrakt tilldelas: ja\nV.2)\n\nKontraktstilldelning\n\nV.2.1)\n\nDatum f\xF6r beslut om tilldelning av kontrakt:\n09/02/2021\n\nV.2.2)\n\nInformation om anbuden\nAntal mottagna anbud: 2\nKontraktet har tilldelats\
    \ en grupp av ekonomiska akt\xF6rer: nej\n\nV.2.3)\n\nUppdragstagarens namn och adress\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n2/3\n\nEUT/S S40\n26/02/2021\n100066-2021-SV\n\n3/3\n\nOfficiellt namn: Stockholms KBT praktik Lisa Gr\xF6nblad AB\nNationellt registreringsnummer: 556824-3454\nPostadress: Box 38116\nOrt: Stockholm\nNuts-kod: SE110 Stockholms l\xE4n\nPostnummer: 100 64\nLand: Sverige\nE-post: lisa.gronblad@stockholmskbt.se\nInternetadress: http://www.stockholmskbt.se\nUppdragstagaren \xE4r ett litet eller medelstort f\xF6retag: ja\nV.2.4)\n\nUpplysningar om kontraktets/delens v\xE4rde (exkl. moms)\nKontraktets/delens totala v\xE4rde: 75 000.00 SEK\n\nV.2.5)\n\nInformation om underentreprenader\n\nAvsnitt VI: Kompletterande upplysningar\nVI.3)\nKompletterande upplysningar:\nVisma annons: https://opic.com/id/afxbptcrdz\nVI.4)\n\n\xD6verpr\xF6vningsf\xF6rfaranden\n\nVI.4.1)\n\nBeh\xF6rigt organ vid \xF6verpr\xF6vning\nOfficiellt namn: F\xF6rvaltningsr\xE4tten\nOrt: Stockholm\n\
    Land: Sverige\n\nVI.5)\n\nDatum d\xE5 meddelandet s\xE4nts:\n23/02/2021\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n3/3\n```\n"
