  content_markdown: "# Dugny statutory benefits insurance contract extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/fr/notice/100000-2021/pdfs\n\n## Listed sources\n- TED notice XML 100000-2021: https://ted.europa.eu/en/notice/100000-2021/xml\n- TED notice PDF 100000-2021 (FR): https://ted.europa.eu/fr/notice/100000-2021/pdfs\n- TED notice detail 100000-2021: https://ted.europa.eu/en/notice/-/detail/100000-2021\n\n## Extracted source text\n\n```text\nJO/S S40\n26/02/2021\n100000-2021-FR\n\n1/3\n\nCet avis sur le site TED: https://ted.europa.eu/udl?uri=TED:NOTICE:100000-2021:TEXT:FR:HTML\n\nFrance-Dugny: Services d'assurances accidents et maladie\n2021/S 040-100000\nAvis d\u2019attribution de march\xE9\nR\xE9sultats de la proc\xE9dure de march\xE9\nServices\nBase juridique:\nDirective 2014/24/UE\nSection I: Pouvoir adjudicateur\nI.1)\nNom et adresses\nNom officiel: Ville de Dugny\nAdresse postale: 1 rue de la R\xE9sistance\n\
    Ville: Dugny\nCode NUTS: FR106 Seine-Saint-Denis\nCode postal: 93440\nPays: France\nCourriel: Marches.publics@mairie-dugny.fr\nT\xE9l\xE9phone: +33 149926666\nAdresse(s) internet:\nAdresse principale: http://www.ville-dugny.fr\nAdresse du profil d\u2019acheteur: https://www.achatpublic.com\nI.4)\n\nType de pouvoir adjudicateur\nAutorit\xE9 r\xE9gionale ou locale\n\nI.5)\n\nActivit\xE9 principale\nServices g\xE9n\xE9raux des administrations publiques\n\nSection II: Objet\nII.1)\n\xC9tendue du march\xE9\nII.1.1)\n\nIntitul\xE9:\nSouscription du contrat d'assurance des prestations statutaires\nNum\xE9ro de r\xE9f\xE9rence: DRH/20/003\n\nII.1.2)\n\nCode CPV principal\n66512000 Services d'assurances accidents et maladie\n\nII.1.3)\n\nType de march\xE9\nServices\n\nII.1.4)\n\nDescription succincte:\nSouscription du contrat d'assurance des prestations statutaires.\n\nII.1.6)\n\nInformation sur les lots\nCe march\xE9 est divis\xE9 en lots: non\n\nII.1.7)\n\nValeur totale du march\xE9 (hors TVA)\n\
    Valeur hors TVA: 1 110 844.80 EUR\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n1/3\n\nJO/S S40\n26/02/2021\n100000-2021-FR\n\n2/3\n\nII.2)\n\nDescription\n\nII.2.2)\n\nCode(s) CPV additionnel(s)\n66512000 Services d'assurances accidents et maladie\n\nII.2.3)\n\nLieu d'ex\xE9cution\nCode NUTS: FR106 Seine-Saint-Denis\n\nII.2.4)\n\nDescription des prestations:\nLe pr\xE9sent appel d'offres a pour objet la souscription du contrat d'assurance des prestations statutaires pour la\ncommune de Dugny.\nLa description des prestations est d\xE9taill\xE9e dans les documents de la consultation.\n\nII.2.5)\n\nCrit\xE8res d\u2019attribution\nCo\xFBt - Nom: Prix / Pond\xE9ration: 40\nCo\xFBt - Nom: Valeur technique / Pond\xE9ration: 30\nCo\xFBt - Nom: Assistance technique / Pond\xE9ration: 30\n\nII.2.11)\n\nInformation sur les options\nOptions: oui\nDescription des options:\nAssurances des prestations statutaires prestation suppl\xE9mentaire \xE9ventuelle n\xBA 1: cong\xE9 de maladie ordinaire.\n\
    \nII.2.13)\n\nInformation sur les fonds de l'Union europ\xE9enne\nLe contrat s'inscrit dans un projet/programme financ\xE9 par des fonds de l'Union europ\xE9enne: non\n\nII.2.14)\n\nInformations compl\xE9mentaires\n\nSection IV: Proc\xE9dure\nIV.1)\nDescription\nIV.1.1)\n\nType de proc\xE9dure\nProc\xE9dure ouverte\n\nIV.1.3)\n\nInformation sur l'accord-cadre ou le syst\xE8me d'acquisition dynamique\n\nIV.1.8)\n\nInformation concernant l\u2019accord sur les march\xE9s publics (AMP)\nLe march\xE9 est couvert par l'accord sur les march\xE9s publics: oui\n\nIV.2)\n\nRenseignements d'ordre administratif\n\nIV.2.1)\n\nPublication ant\xE9rieure relative \xE0 la pr\xE9sente proc\xE9dure\nNum\xE9ro de l'avis au JO s\xE9rie S: 2020/S 217-531393\n\nIV.2.8)\n\nInformations sur l'abandon du syst\xE8me d'acquisition dynamique\n\nIV.2.9)\n\nInformations sur l'abandon de la proc\xE9dure d'appel \xE0 la concurrence sous la forme d'un avis de\npr\xE9information\n\nSection V: Attribution du march\xE9\n\
    Intitul\xE9:\nSouscription du contrat d'assurance des prestations statutaires pour la commune de Dugny\nUn march\xE9/lot est attribu\xE9: oui\nV.2)\n\nAttribution du march\xE9\n\nV.2.1)\n\nDate de conclusion du march\xE9:\n28/12/2020\n\nV.2.2)\n\nInformations sur les offres\nNombre d'offres re\xE7ues: 4\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n2/3\n\nJO/S S40\n26/02/2021\n100000-2021-FR\n\n3/3\n\nLe march\xE9 a \xE9t\xE9 attribu\xE9 \xE0 un groupement d'op\xE9rateurs \xE9conomiques: non\nV.2.3)\n\nNom et adresse du titulaire\nNom officiel: Gras Savoye\nAdresse postale: immeuble quai 33 33/34 quai de Dion-Bouton \u2014 CS 70001\nVille: Puteaux\nCode NUTS: FR FRANCE\nCode postal: 92814\nPays: France\nAdresse internet: http://www.grassavoye.com\nLe titulaire est une PME: non\n\nV.2.4)\n\nInformations sur le montant du march\xE9/du lot (hors TVA)\nValeur totale du march\xE9/du lot: 1 110 844.80 EUR\n\nV.2.5)\n\nInformation sur la sous-traitance\n\nSection VI: Renseignements compl\xE9\
    mentaires\nVI.3)\nInformations compl\xE9mentaires:\nVI.4)\n\nProc\xE9dures de recours\n\nVI.4.1)\n\nInstance charg\xE9e des proc\xE9dures de recours\nNom officiel: Tribunal administratif de Montreuil\nAdresse postale: 7 rue Catherine Puig\nVille: Montreuil\nCode postal: 93100\nPays: France\nCourriel: Greffe.ta-montreuil@juradm.fr\nT\xE9l\xE9phone: +33 149202000\nFax: +33 149202099\nAdresse internet: http://www.ta-montreuil.juradm.fr\n\nVI.5)\n\nDate d\u2019envoi du pr\xE9sent avis:\n22/02/2021\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n3/3\n```\n"
