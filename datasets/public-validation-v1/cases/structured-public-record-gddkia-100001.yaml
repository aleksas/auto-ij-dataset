    wykorzystania limitu

    wynagrodzenia określonego umowie podstawowej.

    W ocenie zamawiającego spełnione są łącznie przesłanki udzielenia zamówienia,
    w trybie art. 214 ust. 1 pkt 7

    ustawy Pzp:

    a) nie upłynął okres 3 lat od dnia udzielenia zamówienia podstawowego;

    b) zamówienie udzielane jest dotychczasowemu wykonawcy zamówienia podstawowego;

    c) zamówienie polega na powtórzeniu podobnych usług;

    d) zamówienie było przewidziane w ogłoszeniu o zamówieniu dla zamówienia podstawowego
    i postanowieniach

    SIWZ;

    e) zamówienie jest zgodne z przedmiotem zamówienia podstawowego;

    f) całkowita wartość tego zamówienia została uwzględniona przy uwzględnianiu wartości
    zamówienia

    podstawowego.

