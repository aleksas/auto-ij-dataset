    oraz Specyfikacji Istotnych Warunków Zamówienia przysługują również organizacjom
    wpisanym na listę, o

    której mowa w art. 154 pkt 5 ustawy Pzp.

    2. Odwołanie przysługuje wyłącznie od niezgodnej z przepisami ustawy Pzp czynności
    zamawiającego podjętej

    w postępowaniu o udzielenie zamówienia lub zaniechania czynności, do której zamawiający
    jest zobowiązany

    na podstawie ustawy Pzp.

    3. Odwołanie powinno wskazywać czynność lub zaniechanie czynności zamawiającego,
    której zarzuca się

    niezgodność z przepisami ustawy Pzp, zawierać zwięzłe przedstawienie zarzutów,
    określać żądanie oraz

    wskazywać okoliczności faktyczne i prawne uzasadniające wniesienie odwołania.

    4. Odwołanie wnosi się do prezesa izby w formie pisemnej lub w postaci elektronicznej,
    podpisane

    bezpiecznym podpisem elektronicznym weryfikowanym przy pomocy ważnego kwalifikowanego
    certyfikatu

    lub równoważnego środka, spełniającego wymagania dla tego rodzaju podpisu. Odwołujący
    przesyła kopię

    odwołania zamawiającemu przed upływem terminu do wniesienia odwołania w taki sposób,
    aby mógł on

    zapoznać się z jego treścią przed upływem tego terminu. Domniemywa się, iż zamawiający
    mógł zapoznać

    się z treścią odwołania przed upływem terminu do jego wniesienia, jeżeli przesłanie
    jego kopii nastąpiło przed

    upływem terminu do jego wniesienia przy użyciu środków komunikacji elektronicznej.

    5. Terminy wniesienia odwołania:

    5.1. odwołanie wnosi się w terminie 10 dni od dnia przesłania informacji o czynności
    zamawiającego

    stanowiącej podstawę jego wniesienia – jeżeli zostały przesłane w sposób określony
    w art. 180 ust. 5 ustawy

    Pzp zdanie drugie, albo w terminie 15 dni – jeżeli zostały przesłane w inny sposób;

    5.2. odwołanie wobec treści ogłoszenia o zamówieniu, a także wobec postanowień
    Specyfikacji Istotnych

    Warunków Zamówienia, wnosi się w terminie 10 dni od dnia publikacji ogłoszenia
    w dzienniku urzędowym unii

    europejskiej lub zamieszczenia Specyfikacji Istotnych Warunków Zamówienia na stronie
    internetowej;

    5.3. odwołanie wobec czynności innych niż określone w pkt 5.1 i 5.2 IDW wnosi
    się w terminie 10 dni od dnia, w

    którym powzięto lub przy zachowaniu należytej staranności można było powziąć wiadomość
    o okolicznościach

    stanowiących podstawę jego wniesienia.

    5.4. jeżeli zamawiający nie przesłał wykonawcy zawiadomienia o wyborze oferty
    najkorzystniejszej odwołanie

    wnosi się nie później niż w terminie:

    1) 30 dni od dnia publikacji w Dzienniku Urzędowym Unii Europejskiej ogłoszenia
    o udzieleniu zamówienia;

    2) 6 miesięcy od dnia zawarcia umowy, jeżeli zamawiający nie opublikował w Dzienniku
    Urzędowym Unii

    Europejskiej ogłoszenia o udzieleniu zamówienia.

    6. Szczegółowe zasady postępowania po wniesieniu odwołania, określają stosowne
    przepisy działu VI ustawy

    Pzp.

    7. Na orzeczenie Krajowej Izby Odwoławczej, stronom oraz uczestnikom postępowania
    odwoławczego

    przysługuje skarga do sądu.

    8. Skargę wnosi się do sądu okręgowego właściwego dla siedziby zamawiającego,
    za pośrednictwem Prezesa

    Krajowej Izby Odwoławczej w terminie 7 dni od dnia doręczenia Orzeczenia Krajowej
    Izby Odwoławczej,

    przesyłając jednocześnie jej odpis przeciwnikowi skargi. złożenie skargi w placówce
    pocztowej operatora

    wyznaczonego w rozumieniu ustawy z dnia 23 listopada 2012 r. Prawo pocztowe (DZ.U.
    z 2012 r. poz. 1529)

    jest równoznaczne z jej wniesieniem.

