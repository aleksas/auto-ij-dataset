    Estudio de alternativas de restauración y rehabilitación fluvial en el río Pas
    dirigidas a la recuperación de

    procesos, morfologías y ecosistemas tanto en el cauce como en las llanuras de
    inundación, que contribuyan a

    aumentar la conectividad transversal y longitudinal mitigar los procesos de incisión
    fluvial y mejorar el estado

    de conservación del espacio ribereño, en un espacio natural pero intensamente
    intervenido. Para ello se

    desarrollarán los siguientes trabajos. FASE A. • Recopilación de información histórica
    desde los años 50

    sobre la evolución de los procesos, morfología y ecosistemas con el fin de determinar
    su impacto antrópico

    • Inventario de los elementos que tiene un mayor impacto en la determinación del
    estado hidromorfológico. •

    Estudio histórico de los procesos hidromorfológicos desde un punto de vista estadístico
    y su correlación con

    las actividades que han contribuido a ellos. • Determinación del estad2o actual
    desde un proceso participativo

    y teniendo en cuenta herramientas cualitativas y cuantitativas de coste/beneficio,
    DAFO para identificar

