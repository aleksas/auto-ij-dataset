  content_markdown: "# Spanish Environment Secretariat river Pas hydromorphology study contract extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/es/notice/454263-2023/pdfs\n\n## Listed sources\n- TED notice XML 454263-2023: https://ted.europa.eu/en/notice/454263-2023/xml\n- TED notice PDF 454263-2023 (ES): https://ted.europa.eu/es/notice/454263-2023/pdfs\n- TED notice detail 454263-2023: https://ted.europa.eu/en/notice/-/detail/454263-2023\n\n## Extracted source text\n\n```text\nDO/S S142\n26/07/2023\n454263-2023-ES\n\n1/4\n\nEl presente anuncio en el sitio web de TED: https://ted.europa.eu/udl?uri=TED:NOTICE:454263-2023:TEXT:ES:HTML\n\nEspa\xF1a-Madrid: Elaboraci\xF3n de proyectos y dise\xF1os, presupuestos\n2023/S 142-454263\nAnuncio de adjudicaci\xF3n de contrato\nResultados del procedimiento de contrataci\xF3n\nServicios\nBase jur\xEDdica:\nDirectiva 2014/24/UE\nApartado I: Poder adjudicador\nI.1)\nNombre y direcciones\n\
    Nombre oficial: Secretar\xEDa de Estado de Medio Ambiente\nN\xFAmero de identificaci\xF3n fiscal: S2801401G\nDirecci\xF3n postal: Plaza San Juan de la Cruz, 10\nLocalidad: Madrid\nC\xF3digo NUTS: ES300 Madrid\nC\xF3digo postal: 28071\nPa\xEDs: Espa\xF1a\nPersona de contacto: Secretar\xEDa de Estado de Medio Ambiente\nCorreo electr\xF3nico: bzn-otfrer-contratos@miteco.es\nDirecciones de internet:\nDirecci\xF3n principal: http://www.miteco.gob.es\nDirecci\xF3n del perfil de comprador: https://contrataciondelestado.es/wps/poc?\nuri=deeplink:perfilContratante&idBp=RRpOPw28tyYQK2TEfXGy%2BA%3D%3D\nI.4)\n\nTipo de poder adjudicador\nMinisterio o cualquier otra autoridad nacional o federal, incluidas sus delegaciones regionales o locales\n\nI.5)\n\nPrincipal actividad\nMedio ambiente\n\nApartado II: Objeto\nII.1)\n\xC1mbito de la contrataci\xF3n\nII.1.1)\n\nDenominaci\xF3n:\nServicios para la redacci\xF3n del estudio hidromorfol\xF3gico y redacci\xF3n de propuestas de actuaci\xF3n en el r\xED\
    o\nPas, desde la confluencia con el r\xEDo de la Magdalena hasta el l\xEDmite del dominio p\xFAblico mar\xEDtimo terrestre\n(Cantabria), en el Marco del Plan de Recuperaci\xF3n, Transformaci\xF3n y Resiliencia (PRTR)\nN\xFAmero de referencia: P02.C05.I2.P02.S01.A17.01\n\nII.1.2)\n\nC\xF3digo CPV principal\n71242000 Elaboraci\xF3n de proyectos y dise\xF1os, presupuestos\n\nII.1.3)\n\nTipo de contrato\nServicios\n\nII.1.4)\n\nBreve descripci\xF3n:\n\n26/07/2023\nS142\nhttps://ted.europa.eu/TED\n\n1/4\n\nDO/S S142\n26/07/2023\n454263-2023-ES\n\n2/4\n\nEstudio de alternativas de restauraci\xF3n y rehabilitaci\xF3n fluvial en el r\xEDo Pas dirigidas a la recuperaci\xF3n de\nprocesos, morfolog\xEDas y ecosistemas tanto en el cauce como en las llanuras de inundaci\xF3n, que contribuyan a\naumentar la conectividad transversal y longitudinal mitigar los procesos de incisi\xF3n fluvial y mejorar el estado\nde conservaci\xF3n del espacio ribere\xF1o, en un espacio natural pero intensamente intervenido.\
    \ Para ello se\ndesarrollar\xE1n los siguientes trabajos. FASE A. \u2022 Recopilaci\xF3n de informaci\xF3n hist\xF3rica desde los a\xF1os 50\nsobre la evoluci\xF3n de los procesos, morfolog\xEDa y ecosistemas con el fin de determinar su impacto antr\xF3pico\n\u2022 Inventario de los elementos que tiene un mayor impacto en la determinaci\xF3n del estado hidromorfol\xF3gico. \u2022\nEstudio hist\xF3rico de los procesos hidromorfol\xF3gicos desde un punto de vista estad\xEDstico y su correlaci\xF3n con\nlas actividades que han contribuido a ellos. \u2022 Determinaci\xF3n del estad2o actual desde un proceso participativo\ny teniendo en cuenta herramientas cualitativas y cuantitativas de coste/beneficio, DAFO para identificar\nactuaciones de mejora. \u2022 Determinaci\xF3n de las alternativas y sus an\xE1lisis desde los puntos de vista funcionales,\nambientales y sociales.\nII.1.6)\n\nInformaci\xF3n relativa a los lotes\nEl contrato est\xE1 dividido en lotes: no\n\nII.1.7)\n\nValor total\
    \ de la contrataci\xF3n (IVA excluido)\nValor IVA excluido: 367 658.08 EUR\n\nII.2)\n\nDescripci\xF3n\n\nII.2.3)\n\nLugar de ejecuci\xF3n\nC\xF3digo NUTS: ES130 Cantabria\n\nII.2.4)\n\nDescripci\xF3n del contrato:\nEstudio de alternativas de restauraci\xF3n y rehabilitaci\xF3n fluvial en el r\xEDo Pas dirigidas a la recuperaci\xF3n de\nprocesos, morfolog\xEDas y ecosistemas tanto en el cauce como en las llanuras de inundaci\xF3n, que contribuyan a\naumentar la conectividad transversal y longitudinal mitigar los procesos de incisi\xF3n fluvial y mejorar el estado\nde conservaci\xF3n del espacio ribere\xF1o, en un espacio natural pero intensamente intervenido. Para ello se\ndesarrollar\xE1n los siguientes trabajos. FASE A. \u2022 Recopilaci\xF3n de informaci\xF3n hist\xF3rica desde los a\xF1os 50\nsobre la evoluci\xF3n de los procesos, morfolog\xEDa y ecosistemas con el fin de determinar su impacto antr\xF3pico\n\u2022 Inventario de los elementos que tiene un mayor impacto en la determinaci\xF3\
    n del estado hidromorfol\xF3gico. \u2022\nEstudio hist\xF3rico de los procesos hidromorfol\xF3gicos desde un punto de vista estad\xEDstico y su correlaci\xF3n con\nlas actividades que han contribuido a ellos. \u2022 Determinaci\xF3n del estad2o actual desde un proceso participativo\ny teniendo en cuenta herramientas cualitativas y cuantitativas de coste/beneficio, DAFO para identificar\nactuaciones de mejora. \u2022 Determinaci\xF3n de las alternativas y sus an\xE1lisis desde los puntos de vista funcionales,\nambientales y sociales.\n\nII.2.5)\n\nCriterios de adjudicaci\xF3n\nCriterio de calidad - Nombre: Criterios cualitativos cuya cuantificaci\xF3n depende de un juicio de valor /\nPonderaci\xF3n: 45\nCriterio relativo al coste - Nombre: Precio y otros criterios objetivos evaluables de forma autom\xE1tica /\nPonderaci\xF3n: 55\n\nII.2.11)\n\nInformaci\xF3n sobre las opciones\nOpciones: no\n\nII.2.13)\n\nInformaci\xF3n sobre fondos de la Uni\xF3n Europea\nEl contrato se refiere a un\
    \ proyecto o programa financiado con fondos de la Uni\xF3n Europea: s\xED\nIdentificaci\xF3n del proyecto:\nP02.C05.I2.P02.S01.A17.01\n\nII.2.14)\n\nInformaci\xF3n adicional\n\n26/07/2023\nS142\nhttps://ted.europa.eu/TED\n\n2/4\n\nDO/S S142\n26/07/2023\n454263-2023-ES\n\n3/4\n\nApartado IV: Procedimiento\nIV.1)\nDescripci\xF3n\nIV.1.1)\n\nTipo de procedimiento\nProcedimiento abierto\n\nIV.1.3)\n\nInformaci\xF3n sobre un acuerdo marco o un sistema din\xE1mico de adquisici\xF3n\n\nIV.1.8)\n\nInformaci\xF3n acerca del Acuerdo sobre Contrataci\xF3n P\xFAblica\nEl contrato est\xE1 cubierto por el Acuerdo sobre Contrataci\xF3n P\xFAblica: no\n\nIV.2)\n\nInformaci\xF3n administrativa\n\nIV.2.1)\n\nPublicaci\xF3n anterior referente al presente procedimiento\nN\xFAmero de anuncio en el DO S: 2023/S 010-023119\n\nIV.2.8)\n\nInformaci\xF3n sobre la terminaci\xF3n del sistema din\xE1mico de adquisici\xF3n\n\nIV.2.9)\n\nInformaci\xF3n sobre la anulaci\xF3n de la convocatoria de licitaci\xF3n en forma\
    \ de anuncio de informaci\xF3n\nprevia\n\nApartado V: Adjudicaci\xF3n de contrato\nContrato n\xBA: 49\nDenominaci\xF3n:\nServicios para la redacci\xF3n del estudio hidromorfol\xF3gico y redacci\xF3n de propuestas de actuaci\xF3n en el r\xEDo\nPas, desde la confluencia con el r\xEDo de la Magdalena hasta el l\xEDmite del dominio p\xFAblico mar\xEDtimo terrestre\n(Cantabria), en el Marco del Plan de Recuperaci\xF3n, Transformaci\xF3n y Resiliencia (PRTR)\nSe adjudica un contrato/lote: s\xED\nV.2)\n\nAdjudicaci\xF3n de contrato\n\nV.2.1)\n\nFecha de celebraci\xF3n del contrato:\n20/07/2023\n\nV.2.2)\n\nInformaci\xF3n sobre las ofertas\nN\xFAmero de ofertas recibidas: 5\nN\xFAmero de ofertas recibidas de PYME: 1\nEl contrato ha sido adjudicado a un grupo de operadores econ\xF3micos: no\n\nV.2.3)\n\nNombre y direcci\xF3n del contratista\nNombre oficial: WSP SPAIN-APIA S.A.U.\nN\xFAmero de identificaci\xF3n fiscal: A39074877\nLocalidad: Madrid\nC\xF3digo NUTS: ES300 Madrid\nPa\xEDs: Espa\xF1\
    a\nEl contratista es una PYME: no\n\nV.2.4)\n\nInformaci\xF3n sobre el valor del contrato/lote (IVA excluido)\nValor total inicial estimado del contrato/lote: 574 555.53 EUR\nValor total del contrato/lote: 367 658.08 EUR\n\nV.2.5)\n\nInformaci\xF3n sobre la subcontrataci\xF3n\n\nApartado VI: Informaci\xF3n complementaria\nVI.3)\nInformaci\xF3n adicional:\nVI.4)\n\nProcedimientos de recurso\n\nVI.4.1)\n\n\xD3rgano competente para los procedimientos de recurso\n\n26/07/2023\nS142\nhttps://ted.europa.eu/TED\n\n3/4\n\nDO/S S142\n26/07/2023\n454263-2023-ES\n\n4/4\n\nNombre oficial: Tribunal Administrativo Central de Recursos Contractuales\nDirecci\xF3n postal: Avenida del General Per\xF3n 38, planta 8\xAA\nLocalidad: Madrid\nC\xF3digo postal: 28020\nPa\xEDs: Espa\xF1a\nVI.5)\n\nFecha de env\xEDo del presente anuncio:\n21/07/2023\n\n26/07/2023\nS142\nhttps://ted.europa.eu/TED\n\n4/4\n```\n"
