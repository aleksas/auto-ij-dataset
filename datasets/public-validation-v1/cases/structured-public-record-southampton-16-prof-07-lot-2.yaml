  content_markdown: "# Southampton electrical maintenance lot 2 contractor extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/en/notice/438853-2017/pdfs\n\n## Listed sources\n- TED notice PDF 438853-2017: https://ted.europa.eu/en/notice/438853-2017/pdfs\n- TED notice HTML 438853-2017: http://ted.europa.eu/udl?uri=TED:NOTICE:438853-2017:TEXT:EN:HTML\n\n## Extracted source text\n\n```text\nOJ/S S211\n03/11/2017\n438853-2017-EN\n\n- - Services - Contract award notice - Restricted procedure\n\n1/6\n\nThis notice in TED website: http://ted.europa.eu/udl?uri=TED:NOTICE:438853-2017:TEXT:EN:HTML\n\nUnited Kingdom-Southampton: Repair and maintenance services of electrical building installations\n2017/S 211-438853\nContract award notice\nResults of the procurement procedure\nServices\nDirective 2014/24/EU\nSection I: Contracting authority\nI.1)\nName and addresses\nUniversity of Southampton\nUniversity Road\nSouthampton\nSO17 1BJ\n\
    United Kingdom\nContact person: Ann Caws\nTelephone: +44 2380595000\nE-mail: tenders@soton.ac.uk\nNUTS code: UKJ32\nInternet address(es):\nMain address: http://www.southampton.ac.uk\nAddress of the buyer profile: https://in-tendhost.co.uk/universityofsouthampton\nI.2)\n\nJoint procurement\n\nI.4)\n\nType of the contracting authority\nBody governed by public law\n\nI.5)\n\nMain activity\nEducation\n\nSection II: Object\nII.1)\nScope of the procurement\nII.1.1)\n\nTitle:\nThe Provision of Electrical Maintenance Services \u2014 Maintenance Term Contract.\nReference number: 16/PROF/07\n\nII.1.2)\n\nMain CPV code\n50711000 - KA04\n\nII.1.3)\n\nType of contract\nServices\n\nII.1.4)\n\nShort description:\nThe University of Southampton is looking to appoint two separate contractors who are wholly unrelated\nand independent of each other for Electrical Maintenance Services. Including, but not limited to electrical\n\n03/11/2017\nS211\nhttp://ted.europa.eu/TED\n\n- - Services - Contract award\
    \ notice - Restricted procedure\nSupplement to the Official Journal of the European Union\n\n1/6\n\nOJ/S S211\n03/11/2017\n438853-2017-EN\n\n- - Services - Contract award notice - Restricted procedure\n\n2/6\n\nmaintenance (test, servicing, defect rectification and upgrade works) directed by the employer under a\nMeasured Term JCT Contract (2011) and additionally as amended by the Employer.\nThe contract term is an initial period of 2 years with an option to extend by a further 4 years, subject to\nsatisfactory performance.\nThe tender has 2 lots:\nLot 1 \u2014 Halls of Residences \u2014 the contractor will test, service and maintain all electrical systems and\nassociated equipment within its Estate in accordance with the specification and the standards referred to in it.\nLot 2 \u2014 Academic Sites \u2014 the Contractor will carry out small scale electrical installation works, measured\nagainst an agreed SoR.\nThe contract shall include for all parts, labour and consumables necessary\
    \ to fulfil the contract.\nII.1.6)\n\nInformation about lots\nThis contract is divided into lots: yes\n\nII.1.7)\n\nTotal value of the procurement (excluding VAT)\nValue excluding VAT: 6 250 000.00 GBP\n\nII.2)\n\nDescription\n\nII.2.1)\n\nTitle:\nLot 1 \u2014 Halls of Residences\nLot No: 1\n\nII.2.2)\n\nAdditional CPV code(s)\n50711000 - KA04\n\nII.2.3)\n\nPlace of performance\nNUTS code: UKJ32\nMain site or place of performance:\nUniversity of Southampton \u2014 Halls of Residences around Southampton, Hampshire and one in Winchester,\nHampshire.\n\nII.2.4)\n\nDescription of the procurement:\nLot 1 \u2014 Halls of Residences \u2014 the Contractor tests, services and maintains all electrical systems and\nassociated equipment within its Estate in accordance with this specification and the standards referred to in it.\nThe main work undertaken by the Contractor shall cover:\ni) Routine Maintenance and installation in accordance with BS7671, Building Testing in accordance with BS7671\n\
    as described in IEE Guidance note 3, in service inspection and testing of electrical equipment in accordance\nwith the IET Code of practice and Annex 3 of this tender document and any other current legislation.\n(ii) Defect rectification and upgrade works as directed by the Contract Administrator to a maximum value of 2\n500 GBP per order. The Contractor will be required to submit a quotation for larger projects in excess of 2 500\nGBP.\n(iii) Provide 24 hour 365 days a year call-out breakdown service with maximum 2 hour response time for all\nCategory 1 work.\n(iv) Other duties as per the specification and as instructed by the Contract Administrator.\nFull details are in the ITT\nThe procurement process will be run as a restricted procedure, consisting of a PQQ & ITT\nStage 1 \u2014 Pre-Qualification Stage: An overall pass mark of 50 % shall apply to this stage. The intention is to\narrive at a shortlist of a maximum of 8 qualified bidders for formal invitation to tender, this will\
    \ be based on the\ntop 8 scores, if there is a tie, all of those bidders will be invited to formal Invitation to Tender stage.\n\n03/11/2017\nS211\nhttp://ted.europa.eu/TED\n\n- - Services - Contract award notice - Restricted procedure\nSupplement to the Official Journal of the European Union\n\n2/6\n\nOJ/S S211\n03/11/2017\n438853-2017-EN\n\n- - Services - Contract award notice - Restricted procedure\n\n3/6\n\nStage 2 \u2014 Invitation to Tender stage \u2014 A maximum of 8 qualified bidders will respond at this stage, with only\none company being awarded a contract.\nContract Value: The estimated value of Lot 1 is approximately 850 000 GBP per annum, this is given in good\nfaith as a guide to past purchasing and current planning to assist you in submitting your tender.\nThe contract term will comprise of an initial period of 2 years with an option to extend by a further 4 years,\ngranted in two (2) year incremental blocks, subject to satisfactory performance.\nTUPE will apply to this\
    \ Lot\nPre-Qualification Evaluation Criteria:\nMandatory Requirements (Pass/Fail):\nGrounds for mandatory exclusion\nGrounds for discretionary exclusion\nEconomic & Financial Standing\nTechnical & Professional \u2014 Relevant Experience \u2014 15 %\nProject specific question 7.1 \u2014 Pass/Fail\nProject specific question.7. 2 \u2014 30 %\nInformation Note 7.3 \u2014 For information only\nProject specific question 7.4 \u2014 20 %\nProject specific question 7.5 \u2014 20 %\nReferences 7.6 \u2014 15 %\nInsurance \u2014 Pass/Fail\nCompliance with Equality Legislation \u2014 Pass/Fail\nEnvironmental Management \u2014 Pass/Fail\nHealth & Safety \u2014 Pass/Fail\nDeclaration \u2014 Pass/Fail.\nII.2.5)\n\nAward criteria\nQuality criterion - Name: Ability to Implement the Contract / Weighting: 9 %\nQuality criterion - Name: Management and Technical Ability / Weighting: 14 %\nQuality criterion - Name: Scenarios / Weighting: 21 %\nQuality criterion - Name: Contract Management / Weighting: 12 %\n\
    Quality criterion - Name: Relevant Experience / Weighting: 4 %\nCost criterion - Name: Basket of Goods \u2014 Grand Total / Weighting: 30 %\nCost criterion - Name: Overheads and Profits / Weighting: 10 %\n\nII.2.11)\n\nInformation about options\nOptions: no\n\nII.2.13)\n\nInformation about European Union funds\nThe procurement is related to a project and/or programme financed by European Union funds: no\n\nII.2.14)\n\nAdditional information\n\nII.2)\n\nDescription\n\nII.2.1)\n\nTitle:\nLot 2 \u2014 Academic Sites\nLot No: 2\n\nII.2.2)\n\nAdditional CPV code(s)\n45310000\n\nII.2.3)\n\nPlace of performance\n\n03/11/2017\nS211\nhttp://ted.europa.eu/TED\n\n- - Services - Contract award notice - Restricted procedure\nSupplement to the Official Journal of the European Union\n\n3/6\n\nOJ/S S211\n03/11/2017\n438853-2017-EN\n\n- - Services - Contract award notice - Restricted procedure\n\n4/6\n\nNUTS code: UKJ32\nNUTS code: UKJ3\nMain site or place of performance:\nUniversity of Southampton \u2014\
    \ Academic Sites across Southampton, Hampshire and one campus in Winchester,\nHampshire.\nOccasionally, locations at Basingstoke, Portsmouth and also Newport, Isle of Wight.\nII.2.4)\n\nDescription of the procurement:\nLot 2 \u2014 Academic Sites \u2014 the Contractor carries out small scale electrical installation works, measured against\nan agreed Schedule of Rates, within its Estate in accordance with this specification and the standards referred\nto in it.\nThe main work undertaken by the Contractor shall cover:\n(i) Small scale electrical installation works\nThe procurement process will be run as a restricted procedure, consisting of a PQQ and ITT\nStage 1 \u2014 Pre-Qualification Stage: An overall pass mark of 50 % shall apply to this stage. The intention is to\narrive at a shortlist of a maximum of 8 qualified bidders for formal invitation to tender, this will be based on the\ntop 8 scores, if there is a tie, all of those bidders will be invited to formal Invitation to Tender\
    \ stage.\nStage 2 \u2014 Invitation to Tender stage \u2014 A maximum of 8 qualified bidders will respond at this stage, with only\none company being awarded a contract.\nContract Value: The estimated value of Lot 2 is approximately 400 000 GBP per annum, this is given in good\nfaith as a guide to past purchasing and current planning to assist you in submitting your tender.\nThe contract term will comprise of an initial period of 2 years with an option to extend by a further 4 years,\ngranted in two (2) year incremental blocks, subject to satisfactory performance.\nTUPE will apply to this Lot\nPre-Qualification Evaluation Criteria:\nMandatory Requirements (Pass/Fail):\nGrounds for mandatory exclusion\nGrounds for discretionary exclusion\nEconomic and Financial Standing\nTechnical and Professional \u2014 Relevant Experience \u2014 15 %\nProject specific question 7.1 \u2014 Pass/Fail\nProject specific question.7. 2 \u2014 30 %\nInformation Note 7.3 \u2014 For information only\nProject specific\
    \ question 7.4 \u2014 20 %\nProject specific question 7.5 \u2014 20 %\nReferences 7.6 \u2014 15 %\nInsurance \u2014 Pass/Fail\nCompliance with Equality Legislation \u2014 Pass/Fail\nEnvironmental Management \u2014 Pass/Fail\nHealth and Safety \u2014 Pass/Fail.\n\nII.2.5)\n\nAward criteria\nQuality criterion - Name: Ability to Implement the Contract / Weighting: 5 %\nQuality criterion - Name: Management and Technical Ability / Weighting: 12 %\nQuality criterion - Name: Scenarios / Weighting: 28 %\nQuality criterion - Name: Contract Management / Weighting: 5 %\nQuality criterion - Name: Relevant Experience / Weighting: 10 %\n\n03/11/2017\nS211\nhttp://ted.europa.eu/TED\n\n- - Services - Contract award notice - Restricted procedure\nSupplement to the Official Journal of the European Union\n\n4/6\n\nOJ/S S211\n03/11/2017\n438853-2017-EN\n\n- - Services - Contract award notice - Restricted procedure\n\n5/6\n\nCost criterion - Name: Basket of Goods \u2014 Grand Total / Weighting: 30 %\nCost\
    \ criterion - Name: Overheads and Profits / Weighting: 10 %\nII.2.11)\n\nInformation about options\nOptions: no\n\nII.2.13)\n\nInformation about European Union funds\nThe procurement is related to a project and/or programme financed by European Union funds: no\n\nII.2.14)\n\nAdditional information\n\nSection IV: Procedure\nIV.1)\nDescription\nIV.1.1)\n\nType of procedure\nRestricted procedure\n\nIV.1.3)\n\nInformation about a framework agreement or a dynamic purchasing system\n\nIV.1.6)\n\nInformation about electronic auction\n\nIV.1.8)\n\nInformation about the Government Procurement Agreement (GPA)\nThe procurement is covered by the Government Procurement Agreement: yes\n\nIV.2)\n\nAdministrative information\n\nIV.2.1)\n\nPrevious publication concerning this procedure\nNotice number in the OJ S: 2017/S 062-116385\n\nIV.2.8)\n\nInformation about termination of dynamic purchasing system\n\nIV.2.9)\n\nInformation about termination of call for competition in the form of a prior information\
    \ notice\n\nSection V: Award of contract\nLot No: 1\nTitle:\nLot 1 \u2014 Halls of Residences\nA contract/lot is awarded: yes\nV.2)\n\nAward of contract\n\nV.2.1)\n\nDate of conclusion of the contract:\n08/09/2017\n\nV.2.2)\n\nInformation about tenders\nNumber of tenders received: 4\nThe contract has been awarded to a group of economic operators: no\n\nV.2.3)\n\nName and address of the contractor\nBSA Regal Electrical Services Ltd\n01634302\nSpeedwell House, West Quay Road\nSouthampton\nSO15 1GY\nUnited Kingdom\nNUTS code: UKJ32\nThe contractor is an SME: yes\n\nV.2.4)\n\nInformation on value of the contract/lot (excluding VAT)\n\n03/11/2017\nS211\nhttp://ted.europa.eu/TED\n\n- - Services - Contract award notice - Restricted procedure\nSupplement to the Official Journal of the European Union\n\n5/6\n\nOJ/S S211\n03/11/2017\n438853-2017-EN\n\n- - Services - Contract award notice - Restricted procedure\n\n6/6\n\nInitial estimated total value of the contract/lot: 5 100 000.00 GBP\nTotal\
