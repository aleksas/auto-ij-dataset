    \ Union\n\n1/4\n\nOJ/S S50\n11/03/2020\n119076-2020-EN\n\nServices - Contract award notice - Open procedure\n\n2/4\n\nSligo County Council is seeking the full range of complimentary consultancy design team services to develop\nthe project from review of part 8 planning approval, to securing all necessary statutory consents, to complete\ntender and construction documentation, tender evaluations, inspection of construction works and issue statutory\ncertification on completion.\nThe architect led design team shall provide services below:\n\u2022 architectural and project management services with a background in urban design,\n\u2022 quantity surveying services,\n\u2022 buildings services engineers \u2014 (mechanical and electrical, incl. public lighting design, audio and visual, smart\ncity capability),\n\u2022 civil and structural engineering services,\n\u2022 exhibition/interpretation designer,\n\u2022 PSDP services \u2014 (health and safety),\n\u2022 fire and emergency access safety\
