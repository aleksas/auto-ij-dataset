    \ Council is seeking the full range of complimentary consultancy design team services to develop\nthe project from review of part 8 planning approval, to securing all necessary statutory consents, to complete\ntender and construction documentation, tender evaluations, inspection of construction works and issue statutory\ncertification on completion.\nThe architect led design team shall be proficient in providing a complete service that includes the following\ndisciplines/services:\n\u2022 architectural and project management services with a background in urban design,\n\u2022 quantity surveying services,\n\n11/03/2020\nS50\nhttps://ted.europa.eu/\nTED\n\nServices - Contract award notice - Open procedure\nSupplement to the Official Journal of the European Union\n\n2/4\n\nOJ/S S50\n11/03/2020\n119076-2020-EN\n\nServices - Contract award notice - Open procedure\n\n3/4\n\n\u2022 buildings services engineers \u2013 (mechanical & electrical, incl. public lighting design, audio and visual,\
