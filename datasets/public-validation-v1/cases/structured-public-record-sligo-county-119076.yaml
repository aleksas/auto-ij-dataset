  content_markdown: "# Sligo County plaza design services contract extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/en/notice/119076-2020/pdfs\n\n## Listed sources\n- TED notice PDF 119076-2020: https://ted.europa.eu/en/notice/119076-2020/pdfs\n- TED notice HTML 119076-2020: https://ted.europa.eu/udl?uri=TED:NOTICE:119076-2020:TEXT:EN:HTML\n\n## Extracted source text\n\n```text\nOJ/S S50\n11/03/2020\n119076-2020-EN\n\nServices - Contract award notice - Open procedure\n\n1/4\n\nThis notice in TED website: https://ted.europa.eu/udl?uri=TED:NOTICE:119076-2020:TEXT:EN:HTML\n\nIreland-Sligo: Architectural, construction, engineering and inspection services\n2020/S 050-119076\nContract award notice\nResults of the procurement procedure\nServices\nLegal Basis:\nDirective 2014/24/EU\nSection I: Contracting authority\nI.1)\nName and addresses\nOfficial name: Sligo County Council\nNational registration number: IE9586690F\nPostal\
