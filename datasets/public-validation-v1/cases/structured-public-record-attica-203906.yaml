    \u03C1\u03B9\u03C3\u03BC\u03BF\u03CD \u03BA\u03C4\u03B9\u03C1\u03AF\u03C9\u03BD\n2023/S 068-203906\n\u0393\u03BD\u03C9\u03C3\u03C4\u03BF\u03C0\u03BF\u03AF\u03B7\u03C3\u03B7 \u03C3\u03C5\u03BD\u03B1\u03C6\u03B8\u03B5\u03AF\u03C3\u03B1\u03C2 \u03C3\u03CD\u03BC\u03B2\u03B1\u03C3\u03B7\u03C2\n\u0391\u03C0\u03BF\u03C4\u03B5\u03BB\u03AD\u03C3\u03BC\u03B1\u03C4\u03B1 \u03C4\u03B7\u03C2 \u03B4\u03B9\u03B1\u03B4\u03B9\u03BA\u03B1\u03C3\u03AF\u03B1\u03C2 \u03C3\u03CD\u03BD\u03B1\u03C8\u03B7\u03C2 \u03C3\u03CD\u03BC\u03B2\u03B1\u03C3\u03B7\u03C2\n\u03A5\u03C0\u03B7\u03C1\u03B5\u03C3\u03AF\u03B5\u03C2\n\u039D\u03BF\u03BC\u03B9\u03BA\u03AE \u03B2\u03AC\u03C3\u03B7:\n\u039F\u03B4\u03B7\u03B3\u03AF\u03B1 2014/24/\u0395\u0395\n\u03A4\u03BC\u03AE\u03BC\u03B1 I: \u0391\u03BD\u03B1\u03B8\u03AD\u03C4\u03BF\u03C5\u03C3\u03B1 \u03B1\u03C1\u03C7\u03AE\nI.1)\n\u0395\u03C0\u03C9\u03BD\u03C5\u03BC\u03AF\u03B1 \u03BA\u03B1\u03B9 \u03B4\u03B9\u03B5\u03C5\u03B8\u03CD\u03BD\u03C3\u03B5\u03B9\u03C2\n\u0395\u03C0\u03AF\
    \u03C3\u03B7\u03BC\u03B7 \u03B5\u03C0\u03C9\u03BD\u03C5\u03BC\u03AF\u03B1: \u0391\u03A0\u039F\u039A\u0395\u039D\u03A4\u03A1\u03A9\u039C\u0395\u039D\u0397 \u0394\u0399\u039F\u0399\u039A\u0397\u03A3\u0397 \u0391\u03A4\u03A4\u0399\u039A\u0397\u03A3\n\u03A4\u03B1\u03C7. \u03B4\u03B9\u03B5\u03CD\u03B8\u03C5\u03BD\u03C3\u03B7: \u039A\u0391\u03A4\u0395\u03A7\u0391\u039A\u0397 56\n\u03A0\u03CC\u03BB\u03B7: \u0391\u0398\u0397\u039D\u0391\n\u039A\u03C9\u03B4\u03B9\u03BA\u03CC\u03C2 NUTS: EL303 \u039A\u03B5\u03BD\u03C4\u03C1\u03B9\u03BA\u03CC\u03C2 \u03A4\u03BF\u03BC\u03AD\u03B1\u03C2 \u0391\u03B8\u03B7\u03BD\u03CE\u03BD / Kentrikos Tomeas Athinon\n\u03A4\u03B1\u03C7. \u03BA\u03C9\u03B4\u03B9\u03BA\u03CC\u03C2: 11525\n\u03A7\u03CE\u03C1\u03B1: \u0395\u039B\u039B\u0391\u0394\u0391\n\u0397\u03BB\u03B5\u03BA\u03C4\u03C1\u03BF\u03BD\u03B9\u03BA\u03CC \u03C4\u03B1\u03C7\u03C5\u03B4\u03C1\u03BF\u03BC\u03B5\u03AF\u03BF: p.rigakos@attica.gr\n\u03A4\u03B7\u03BB\u03AD\u03C6\u03C9\u03BD\u03BF: +30 2132035659\n\
    \u03A6\u03B1\u03BE: +30 2132035657\n\u0394\u03B9\u03B5\u03CD\u03B8\u03C5\u03BD\u03C3\u03B7(-\u03B5\u03B9\u03C2) \u03C3\u03C4\u03BF \u03B4\u03B9\u03B1\u03B4\u03AF\u03BA\u03C4\u03C5\u03BF:\n\u0393\u03B5\u03BD\u03B9\u03BA\u03AE \u03B4\u03B9\u03B5\u03CD\u03B8\u03C5\u03BD\u03C3\u03B7: www.apdattikis.gov.gr\nI.4)\n\n\u0395\u03AF\u03B4\u03BF\u03C2 \u03C4\u03B7\u03C2 \u03B1\u03BD\u03B1\u03B8\u03AD\u03C4\u03BF\u03C5\u03C3\u03B1\u03C2 \u03B1\u03C1\u03C7\u03AE\u03C2\n\u03A5\u03C0\u03BF\u03C5\u03C1\u03B3\u03B5\u03AF\u03BF \u03AE \u03AC\u03BB\u03BB\u03B7 \u03B5\u03B8\u03BD\u03B9\u03BA\u03AE \u03AE \u03BF\u03BC\u03BF\u03C3\u03C0\u03BF\u03BD\u03B4\u03B9\u03B1\u03BA\u03AE \u03B1\u03C1\u03C7\u03AE, \u03C3\u03C5\u03BC\u03C0\u03B5\u03C1\u03B9\u03BB\u03B1\u03BC\u03B2\u03B1\u03BD\u03BF\u03BC\u03AD\u03BD\u03C9\u03BD \u03C4\u03C9\u03BD \u03C0\u03B5\u03C1\u03B9\u03C6\u03B5\u03C1\u03B5\u03B9\u03B1\u03BA\u03CE\u03BD \u03AE \u03C4\u03BF\u03C0\u03B9\u03BA\u03CE\u03BD \u03C4\u03BF\u03C5\u03C2\n\u03C0\u03B1\u03C1\
    \u03B1\u03C1\u03C4\u03B7\u03BC\u03AC\u03C4\u03C9\u03BD\n\nI.5)\n\n\u039A\u03CD\u03C1\u03B9\u03B1 \u03B4\u03C1\u03B1\u03C3\u03C4\u03B7\u03C1\u03B9\u03CC\u03C4\u03B7\u03C4\u03B1\n\u0393\u03B5\u03BD\u03B9\u03BA\u03AD\u03C2 \u03B4\u03B7\u03BC\u03CC\u03C3\u03B9\u03B5\u03C2 \u03C5\u03C0\u03B7\u03C1\u03B5\u03C3\u03AF\u03B5\u03C2\n\n\u03A4\u03BC\u03AE\u03BC\u03B1 II: \u0391\u03BD\u03C4\u03B9\u03BA\u03B5\u03AF\u03BC\u03B5\u03BD\u03BF\nII.1)\n\u0395\u03CD\u03C1\u03BF\u03C2 \u03C4\u03B7\u03C2 \u03C3\u03CD\u03BC\u03B2\u03B1\u03C3\u03B7\u03C2\nII.1.1)\n\n\u03A4\u03AF\u03C4\u03BB\u03BF\u03C2:\n\u0395\u03C0\u03B1\u03BD\u03B1\u03BB\u03B7\u03C0\u03C4\u03B9\u03BA\u03AE \u03B4\u03B9\u03B1\u03B4\u03B9\u03BA\u03B1\u03C3\u03AF\u03B1 \u03B1\u03BD\u03AC\u03B8\u03B5\u03C3\u03B7\u03C2 \u03B3\u03B9\u03B1 \u03C4\u03B7\u03BD \u03C0\u03B1\u03C1\u03BF\u03C7\u03AE \u03C5\u03C0\u03B7\u03C1\u03B5\u03C3\u03B9\u03CE\u03BD \u03BA\u03B1\u03B8\u03B1\u03C1\u03B9\u03CC\u03C4\u03B7\u03C4\u03B1\u03C2 \u03C3\u03C4\u03B1 \u03BA\
    \u03C4\u03AF\u03C1\u03B9\u03B1 \u03C0\u03BF\u03C5 \u03C3\u03C4\u03B5\u03B3\u03AC\u03B6\u03BF\u03BD\u03C4\u03B1\u03B9 \u03BF\u03B9\n\u03BF\u03C1\u03B3\u03B1\u03BD\u03B9\u03BA\u03AD\u03C2 \u03BC\u03BF\u03BD\u03AC\u03B4\u03B5\u03C2 \u03C4\u03B7\u03C2 \u0391\u03C0\u03BF\u03BA\u03B5\u03BD\u03C4\u03C1\u03C9\u03BC\u03AD\u03BD\u03B7\u03C2 \u0394\u03B9\u03BF\u03AF\u03BA\u03B7\u03C3\u03B7\u03C2 \u0391\u03C4\u03C4\u03B9\u03BA\u03AE\u03C2\n\nII.1.2)\n\n\u039A\u03C9\u03B4\u03B9\u03BA\u03CC\u03C2 \u03BA\u03CD\u03C1\u03B9\u03BF\u03C5 \u03BB\u03B5\u03BE\u03B9\u03BB\u03BF\u03B3\u03AF\u03BF\u03C5 CPV\n90911200 \u03A5\u03C0\u03B7\u03C1\u03B5\u03C3\u03AF\u03B5\u03C2 \u03BA\u03B1\u03B8\u03B1\u03C1\u03B9\u03C3\u03BC\u03BF\u03CD \u03BA\u03C4\u03B9\u03C1\u03AF\u03C9\u03BD\n\nII.1.3)\n\n\u0395\u03AF\u03B4\u03BF\u03C2 \u03C3\u03CD\u03BC\u03B2\u03B1\u03C3\u03B7\u03C2\n\u03A5\u03C0\u03B7\u03C1\u03B5\u03C3\u03AF\u03B5\u03C2\n\nII.1.4)\n\n\u03A3\u03CD\u03BD\u03C4\u03BF\u03BC\u03B7 \u03C0\u03B5\u03C1\u03B9\u03B3\u03C1\
    \u03B1\u03C6\u03AE:\n\u03C0\u03B1\u03C1\u03BF\u03C7\u03AE \u03C5\u03C0\u03B7\u03C1\u03B5\u03C3\u03B9\u03CE\u03BD \u03BA\u03B1\u03B8\u03B1\u03C1\u03B9\u03CC\u03C4\u03B7\u03C4\u03B1\u03C2 \u03C3\u03C4\u03B1 \u03BA\u03C4\u03AF\u03C1\u03B9\u03B1 \u03C0\u03BF\u03C5 \u03C3\u03C4\u03B5\u03B3\u03AC\u03B6\u03BF\u03BD\u03C4\u03B1\u03B9 \u03BF\u03B9 \u03BF\u03C1\u03B3\u03B1\u03BD\u03B9\u03BA\u03AD\u03C2 \u03BC\u03BF\u03BD\u03AC\u03B4\u03B5\u03C2 \u03C4\u03B7\u03C2 \u0393\u03B5\u03BD\u03B9\u03BA\u03AE\u03C2 \u0394\u03B9\u03B5\u03CD\u03B8\u03C5\u03BD\u03C3\u03B7\u03C2\n\u0391\u03C3\u03C4\u03B9\u03BA\u03AE\u03C2 \u039A\u03B1\u03C4\u03AC\u03C3\u03C4\u03B1\u03C3\u03B7\u03C2, \u039C\u03B5\u03C4\u03B1\u03BD\u03AC\u03C3\u03C4\u03B5\u03C5\u03C3\u03B7\u03C2 \u03BA\u03B1\u03B9 \u039A\u03BF\u03B9\u03BD\u03C9\u03C6\u03B5\u03BB\u03CE\u03BD \u03A0\u03B5\u03C1\u03B9\u03BF\u03C5\u03C3\u03B9\u03CE\u03BD \u03C4\u03B7\u03C2 \u0391\u03C0\u03BF\u03BA\u03B5\u03BD\u03C4\u03C1\u03C9\u03BC\u03AD\u03BD\u03B7\u03C2 \u0394\
    \u03B9\u03BF\u03AF\u03BA\u03B7\u03C3\u03B7\u03C2 \u0391\u03C4\u03C4\u03B9\u03BA\u03AE\u03C2.\n\nII.1.6)\n\n\u03A0\u03BB\u03B7\u03C1\u03BF\u03C6\u03BF\u03C1\u03AF\u03B5\u03C2 \u03C3\u03C7\u03B5\u03C4\u03B9\u03BA\u03AC \u03BC\u03B5 \u03C4\u03B1 \u03C4\u03BC\u03AE\u03BC\u03B1\u03C4\u03B1\n\u0397 \u03C0\u03B1\u03C1\u03BF\u03CD\u03C3\u03B1 \u03C3\u03CD\u03BC\u03B2\u03B1\u03C3\u03B7 \u03C5\u03C0\u03BF\u03B4\u03B9\u03B1\u03B9\u03C1\u03B5\u03AF\u03C4\u03B1\u03B9 \u03C3\u03B5 \u03C4\u03BC\u03AE\u03BC\u03B1\u03C4\u03B1: \u03BD\u03B1\u03B9\n\n05/04/2023\nS68\nhttps://ted.europa.eu/TED\n\n1/3\n\nEE/S S68\n05/04/2023\n203906-2023-EL\n\n2/3\n\nII.1.7)\n\n\u03A3\u03C5\u03BD\u03BF\u03BB\u03B9\u03BA\u03AE \u03B1\u03BE\u03AF\u03B1 \u03C4\u03C9\u03BD \u03C0\u03C1\u03BF\u03BC\u03B7\u03B8\u03B5\u03B9\u03CE\u03BD (\u03C7\u03C9\u03C1\u03AF\u03C2 \u03A6\u03A0\u0391)\n\u0391\u03BE\u03AF\u03B1 \u03C7\u03C9\u03C1\u03AF\u03C2 \u03A6\u03A0\u0391: 149 712.00 EUR\n\nII.2)\n\n\u03A0\u03B5\u03C1\u03B9\u03B3\u03C1\u03B1\
