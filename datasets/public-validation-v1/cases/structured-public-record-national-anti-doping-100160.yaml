    Dezvoltarea sistemului informatic servește următoarelor scopuri:

    — de a îmbunătăți procesul de management și digitalizarea fluxurilor de lucru
    din cadrul ANAD prin dezvoltarea

    și implementarea unei platforme informatice pentru servicii electronice care va
    asigura accesul online la

    serviciile publice de avizare/autorizare gestionate de ANAD și va furniza digital
    fluxurile de lucru asociate

    proceselor de avizare/autorizare din cadrul instituției;

    — de a îmbunătăți planificarea strategică, a managementului calității și performanței,
    de a sistematiza și

    simplifica fondul activ al legislației Agenției Naționale Anti-Doping.

    Dezvoltarea sistemului informatic va răspunde următoarelor nevoi ale AC:

    — sistem de management integrat a sistemului de prevenire a dopajului în sport,
    de gestionare a controlului

    anti-doping;

    — de management (management de documente, management financiar, resurse umane,
    date cu caracter

    personal, stocuri etc.);

    — de asigurare a accesului online la serviciile publice de avizare/autorizare
    gestionate de ANAD;

    — baza de date care va cuprinde arhiva digitalizată a autorizațiilor și avizelor
    emise;

    — de consultare publică privind inițiativele legislative ale ANAD și de informare
    și conștientizare privind noutățile

    legislative;

    — secțiunea de gestionare a informațiilor încărcate pe info-chioșcuri;

    — secțiunea e-learning dedicată activităților educative derulate de agenție (managementul
    documentelor,

    managementul informației, managementul cursurilor, managementul cursanților, managementul
    formării,

    managementul formatorilor, evaluare).

    Se vor digitaliza procesele aferente următoarelor metodologii:

    1. informarea sportivilor de performanță, antrenori, medici, personal auxiliar
    etc.;

    2. informarea sportivilor amatori și instructori;

    3. regulament de prelevare probe biologice;

    4. consultarea publică.

    Prin sistemul informatic se vor monitoriza:

    (a) sistem de management integrat a sistemului de prevenire, a dopajului în sport,
    de gestionare a controlului

    anti-doping;

    (b) sistem de management;

    (c) sistem de asigurare a accesului online la serviciile publice de avizare/autorizare
    gestionate de ANAD;

    (d) baza de date care va cuprinde arhiva digitalizata a autorizațiilor și avizelor
    emise;

    (e) sistemul de consultare publică privind inițiativele legislative ale ANAD și
    de informare și conștientizare

    privind noutățile legislative.

