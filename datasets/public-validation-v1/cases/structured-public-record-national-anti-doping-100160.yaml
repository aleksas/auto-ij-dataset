  content_markdown: "# Romanian National Anti-Doping Agency software development contract extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/ro/notice/100160-2021/pdfs\n\n## Listed sources\n- TED notice XML 100160-2021: https://ted.europa.eu/en/notice/100160-2021/xml\n- TED notice PDF 100160-2021 (RO): https://ted.europa.eu/ro/notice/100160-2021/pdfs\n- TED notice detail 100160-2021: https://ted.europa.eu/en/notice/-/detail/100160-2021\n\n## Extracted source text\n\n```text\nJO/S S40\n26/02/2021\n100160-2021-RO\n\n1/5\n\nAcest anun\u0163 pe site-ul TED: https://ted.europa.eu/udl?uri=TED:NOTICE:100160-2021:TEXT:RO:HTML\n\nRom\xE2nia-Bucure\u015Fti: Servicii de dezvoltare de software IT\n2021/S 040-100160\nAnun\u021B de atribuire a contractului\nRezultatele procedurii de achizi\u0163ie\nServicii\nTemei juridic:\nDirectiva 2014/24/UE\nSec\u021Biunea I: Autoritatea contractant\u0103\nI.1)\nDenumire \u015Fi adrese\nDenumire\
    \ oficial\u0103: Agen\u021Bia Na\u021Bional\u0103 Anti-Doping\nNum\u0103r na\u0163ional de \xEEnregistrare: 18018990\nAdres\u0103: Str. Basarabia nr. 37-39\nLocalitate: Bucure\u015Fti\nCod NUTS: RO321 Bucure\u015Fti\nCod po\u0219tal: 022103\n\u021Aar\u0103: Rom\xE2nia\nPersoan\u0103 de contact: Alexandru Mihai Zaharia\nE-mail: a.zaharia@anad.gov.ro\nTelefon: +40 3115541\nFax: +40 3115541\nAdres\u0103 (adrese) internet:\nAdresa principal\u0103: www.anad.gov.ro\nAdresa profilului cump\u0103r\u0103torului: www.e-licitatie.ro\nI.4)\n\nTipul autorit\u0103\u021Bii contractante\nAgen\u021Bie/birou regional sau local\n\nI.5)\n\nActivitate principal\u0103\nAlt\u0103 activitate: Antidoping\n\nSec\u021Biunea II: Obiect\nII.1)\nObiectul achizi\u0163iei\nII.1.1)\n\nTitlu:\nServicii de dezvoltare de aplica\u021Bii \u0219i sisteme informatice, achizi\u021Bie pachete software \u0219i echipamente\nNum\u0103r de referin\u0163\u0103: 8\n\nII.1.2)\n\nCod CPV principal\n72212517 Servicii de dezvoltare de\
    \ software IT\n\nII.1.3)\n\nTipul contractului\nServicii\n\nII.1.4)\n\nDescriere succint\u0103:\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n1/5\n\nJO/S S40\n26/02/2021\n100160-2021-RO\n\n2/5\n\nANAD dore\u0219te s\u0103 achizi\u021Bioneze servicii de dezvoltare de aplica\u021Bii \u0219i sisteme informatice, achizi\u021Bie pachete\nsoftware \u0219i echipamente care vor asigura accesul online la serviciile publice de avizare/autorizare gestionate de\nANAD \u0219i va furniza digital fluxurile de lucru asociate proceselor de avizare/autorizare din cadrul institu\u021Biei.\nAchizi\u021Bia este planificat\u0103 \xEEn cadrul proiectului \u201EAjustarea legisla\u021Biei relevante privind combaterea dopajului\n\xEEn sport\u201D, cod My SMIS 130073, cod SIPOCA 740. Proiectul este cofinan\u021Bat din Fondul social european prin\nProgramul Opera\u021Bional Capacitate Administrativ\u0103, Axa prioritar\u0103 1 \u2013 \u201EAdministra\u021Bie public\u0103 \u0219i sistem judiciar\neficiente\u201D\
    /Obiectivul specific 1.1 \u2013 \u201EDezvoltarea \u0219i introducerea de sisteme \u0219i standarde comune \xEEn administra\u021Bia\npublic\u0103 ce optimizeaz\u0103 procesele decizionale orientate c\u0103tre cet\u0103\u021Beni \u0219i mediul de afaceri \xEEn concordan\u021B\u0103 cu\nSCAP\u201D (Strategia privind Consolidarea Administra\u021Biei Publice 2014-2020). Proiectul are ca obiectiv general este\nde a \xEEmbun\u0103t\u0103\u021Bi planificarea strategic\u0103, a managementului calit\u0103\u021Bii \u0219i performan\u021Bei, de a sistematiza \u0219i simplifica\nfondul activ al legisla\u021Biei Agen\u021Biei Na\u021Bionale Anti-Doping.\nObiectivele specifice ale proiectului sunt:\n1. Imbun\u0103t\u0103\u021Birea cadrului metodologic privind combaterea dopajului \xEEn sport, cu accent pe m\u0103suri de\ncon\u0219tientizare \u015Fi prevenire a dopajului \xEEn sport prin realizarea, testarea \u0219i adoptarea a patru metodologii de lucru\n\u0219i a unui studiu. Prin acest obiectiv,\
    \ proiectul propus de ANAD se \xEEncadreaza \xEEn tipurile de ac\u021Biuni orientative din\ncadrul ghidului solicitantului \u201EDezvoltarea de sisteme \u015Fi instrumente de management\u201D;\n2. Actualizarea \u0219i \xEEmbunat\u0103\u021Birea cadrului legislativ pentru implementarea reglement\u0103rilor interna\u021Bionale privind\ncombaterea dopajului \xEEn sport, inclusiv a sistemului de monitorizare a dopajului, prevenirea \u0219i combaterea\ntraficului ilicit de substan\u021Be dopante cu grad mare de risc, definit \u0219i dezvoltat prin realizarea a cinci ini\u021Biative\nlegislative \xEEn consultare activ\u0103 public\u0103;\n3. \xCEmbun\u0103t\u0103\u0163irea procesului de management \u0219i digitalizarea fluxurilor de lucru din cadrul ANAD prin dezvoltarea\n\u0219i implementarea unei platforme informatice pentru servicii electronice care va asigura accesul online la\nserviciile publice de avizare/autorizare gestionate de ANAD \u0219i va furniza digital fluxurile de lucru asociate\n\
    proceselor de avizare/autorizare din cadrul institu\u021Biei;\n4. Imbun\u0103t\u0103\u021Birea competen\u021Belor personalului ANAD prin realizarea unei metodologii de formare a personalului \u0219i\nderularea a patru programe de formare pentru 49 de angaja\u021Bi ai ANAD.\nII.1.6)\n\nInforma\u021Bii privind loturile\nContractul este \xEEmp\u0103r\u021Bit \xEEn loturi: nu\n\nII.1.7)\n\nValoarea total\u0103 a achizi\u0163iei (f\u0103r\u0103 TVA)\nValoare f\u0103r\u0103 TVA: 2 049 753.54 RON\n\nII.2)\n\nDescriere\n\nII.2.2)\n\nCod(uri) CPV suplimentar(e)\n30210000 Ma\u015Fini de procesare a datelor (hardware)\n30213100 Computere portabile\n30213300 Computer de birou\n30231000 Ecrane \u015Fi console de computere\n30231100 Terminale informatice\n30231300 Ecrane de afi\u015Fare\n48000000 Pachete software \u015Fi sisteme informatice\n48800000 Sisteme de informare \u015Fi servere\n\nII.2.3)\n\nLocul de executare\nCod NUTS: RO321 Bucure\u015Fti\nLocul principal de executare:\nLa sediul ANAD.\n\
    \nII.2.4)\n\nDescrierea achizi\u0163iei publice:\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n2/5\n\nJO/S S40\n26/02/2021\n100160-2021-RO\n\n3/5\n\nDezvoltarea sistemului informatic serve\u0219te urm\u0103toarelor scopuri:\n\u2014 de a \xEEmbun\u0103t\u0103\u021Bi procesul de management \u0219i digitalizarea fluxurilor de lucru din cadrul ANAD prin dezvoltarea\n\u0219i implementarea unei platforme informatice pentru servicii electronice care va asigura accesul online la\nserviciile publice de avizare/autorizare gestionate de ANAD \u0219i va furniza digital fluxurile de lucru asociate\nproceselor de avizare/autorizare din cadrul institu\u021Biei;\n\u2014 de a \xEEmbun\u0103t\u0103\u021Bi planificarea strategic\u0103, a managementului calit\u0103\u021Bii \u0219i performan\u021Bei, de a sistematiza \u0219i\nsimplifica fondul activ al legisla\u021Biei Agen\u021Biei Na\u021Bionale Anti-Doping.\nDezvoltarea sistemului informatic va r\u0103spunde urm\u0103toarelor nevoi ale AC:\n\u2014\
    \ sistem de management integrat a sistemului de prevenire a dopajului \xEEn sport, de gestionare a controlului\nanti-doping;\n\u2014 de management (management de documente, management financiar, resurse umane, date cu caracter\npersonal, stocuri etc.);\n\u2014 de asigurare a accesului online la serviciile publice de avizare/autorizare gestionate de ANAD;\n\u2014 baza de date care va cuprinde arhiva digitalizat\u0103 a autoriza\u021Biilor \u0219i avizelor emise;\n\u2014 de consultare public\u0103 privind ini\u021Biativele legislative ale ANAD \u0219i de informare \u0219i con\u0219tientizare privind nout\u0103\u021Bile\nlegislative;\n\u2014 sec\u021Biunea de gestionare a informa\u021Biilor \xEEnc\u0103rcate pe info-chio\u0219curi;\n\u2014 sec\u021Biunea e-learning dedicat\u0103 activit\u0103\u021Bilor educative derulate de agen\u021Bie (managementul documentelor,\nmanagementul informa\u021Biei, managementul cursurilor, managementul cursan\u021Bilor, managementul form\u0103rii,\nmanagementul\
    \ formatorilor, evaluare).\nSe vor digitaliza procesele aferente urm\u0103toarelor metodologii:\n1. informarea sportivilor de performan\u021B\u0103, antrenori, medici, personal auxiliar etc.;\n2. informarea sportivilor amatori \u0219i instructori;\n3. regulament de prelevare probe biologice;\n4. consultarea public\u0103.\nPrin sistemul informatic se vor monitoriza:\n(a) sistem de management integrat a sistemului de prevenire, a dopajului \xEEn sport, de gestionare a controlului\nanti-doping;\n(b) sistem de management;\n(c) sistem de asigurare a accesului online la serviciile publice de avizare/autorizare gestionate de ANAD;\n(d) baza de date care va cuprinde arhiva digitalizata a autoriza\u021Biilor \u0219i avizelor emise;\n(e) sistemul de consultare public\u0103 privind ini\u021Biativele legislative ale ANAD \u0219i de informare \u0219i con\u0219tientizare\nprivind nout\u0103\u021Bile legislative.\nII.2.5)\n\nCriterii de atribuire\nCriteriu privind calitatea - Nume: Factor tehnic \u2013\
    \ demonstrarea unei abord\u0103ri \u0219i a unei metodologii prin\npropunerea tehnic\u0103, corespunz\u0103toare pentru ob\u021Binerea calit\u0103\u021Bii rezultatelor \u0219i livrabilelor impuse prin caietul de\nsarcini; 10 puncte/10 % / Pondere: 10\nCriteriu privind calitatea - Nume: Gradul de adecvare al planului de lucru propus pentru realizarea obiectului\ncontractului / Pondere: 10\nCriteriu privind calitatea - Nume: Experien\u021Ba similar\u0103 *a exper\u021Bilor cheie, din care: / Pondere: 15\nCriteriu privind calitatea - Nume: Timpul de rezolvare a incidentelor cu nivel de prioritate \u201ECritic\u201D din cadrul\ngaran\u021Biei de bun\u0103 func\u021Bionare, a suportului \u0219i asisten\u021Bei tehnice a solu\u021Biei software / Pondere: 10\nCriteriu privind calitatea - Nume: Perioada de asigurare a serviciilor de mentenan\u021B\u0103 corectiv\u0103 \u0219i evolutiv\u0103 /\nPondere: 15\nPre\u021Bul - Pondere: 40\n\nII.2.11)\n\nInforma\u021Bii privind op\u021Biunile\n\n26/02/2021\n\
    S40\nhttps://ted.europa.eu/TED\n\n3/5\n\nJO/S S40\n26/02/2021\n100160-2021-RO\n\n4/5\n\nOp\u021Biuni: nu\nII.2.13)\n\nInforma\u021Bii despre fondurile Uniunii Europene\nAchizi\u0163ia se refer\u0103 la un proiect \u015Fi/sau program finan\u0163at din fonduri ale Uniunii Europene: nu\n\nII.2.14)\n\nInforma\u021Bii suplimentare\n\nSec\u021Biunea IV: Procedur\u0103\nIV.1)\nDescriere\nIV.1.1)\n\nTipul procedurii\nProcedur\u0103 deschis\u0103\n\nIV.1.3)\n\nInforma\u0163ii privind un acord-cadru sau un sistem dinamic de achizi\u0163ii\n\nIV.1.8)\n\nInforma\u021Bii despre Acordul privind achizi\u021Biile publice (AAP)\nAchizi\u0163ia intr\u0103 sub inciden\u0163a Acordului privind achizi\u0163iile publice: nu\n\nIV.2)\n\nInforma\u021Bii administrative\n\nIV.2.1)\n\nPublicare anterioar\u0103 privind aceast\u0103 procedur\u0103\nNum\u0103rul anun\u021Bului \xEEn JO S: 2020/S 193-466692\n\nIV.2.8)\n\nInforma\u0163ii privind \xEEncetarea sistemului dinamic de achizi\u0163ii\n\nIV.2.9)\n\nInforma\u0163\
    ii privind \xEEncetarea unei invita\u0163ii la o procedur\u0103 concuren\u0163ial\u0103 de ofertare sub forma unui anun\u0163\nde inten\u0163ie\n\nSec\u021Biunea V: Atribuirea contractului\nContract nr.: 740/130073/2021/02/22/01\nTitlu:\nContract servicii de dezvoltare de aplica\u021Bii \u0219i sisteme informatice, achizi\u021Bie pachete software \u0219i echipamente\n(activit\u0103\u021Bi management de proiect \u0219i activit\u0103\u021Bi diferite fa\u021B\u0103 de managementul de proiect)\nSe atribuie un contract/un lot: da\nV.2)\n\nAtribuirea contractului\n\nV.2.1)\n\nData \xEEncheierii contractului:\n22/02/2021\n\nV.2.2)\n\nInforma\u0163ii privind ofertele\nNum\u0103rul de oferte primite: 3\nNum\u0103rul de oferte primite de la IMM-uri: 3\nNum\u0103rul de oferte primite de la ofertan\u0163i din alte state membre ale UE: 0\nNum\u0103rul de oferte primite de la ofertan\u0163i din state care nu sunt membre ale UE: 0\nNum\u0103rul de oferte primite prin mijloace electronice: 3\nContractul\
    \ a fost atribuit unui grup de operatori economici: nu\n\nV.2.3)\n\nNumele \u015Fi adresa contractantului\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n4/5\n\nJO/S S40\n26/02/2021\n100160-2021-RO\n\n5/5\n\nDenumire oficial\u0103: Holisun\nNum\u0103r na\u0163ional de \xEEnregistrare: RO 14184124\nAdres\u0103: Str. C\u0103rbunari nr. 8\nLocalitate: NA\nCod NUTS: RO114 Maramure\u015F\nCod po\u0219tal: 430397\n\u021Aar\u0103: Rom\xE2nia\nE-mail: oliviu.matei@holisun.com\nTelefon: +40 262226778\nAdres\u0103 internet: www.holisun.com\nContractantul este un IMM: nu\nV.2.4)\n\nInforma\u0163ii privind valoarea contractului/lotului (f\u0103r\u0103 TVA)\nValoarea total\u0103 estimat\u0103 ini\u0163ial\u0103 a contractului/lotului: 2 626 500.00 RON\nValoarea total\u0103 a contractului/lotului: 2 049 753.54 RON\n\nV.2.5)\n\nInforma\u021Bii privind subcontractarea\n\nSec\u021Biunea VI: Informa\u021Bii complementare\nVI.3)\nInforma\u021Bii suplimentare:\nVI.4)\n\nProceduri de contestare\n\nVI.4.1)\n\
    \nOrganismul de solu\u0163ionare a contesta\u0163iilor\nDenumire oficial\u0103: Consiliul Na\u021Bional de Solu\u021Bionare a Contesta\u021Biilor\nAdres\u0103: Str. Stavropoleos nr. 6, sector 3\nLocalitate: Bucure\u0219ti\nCod po\u0219tal: 030084\n\u021Aar\u0103: Rom\xE2nia\nE-mail: office@cnsc.ro\nTelefon: +40 213104641\nFax: +40 213104642 / +40 218900745\nAdres\u0103 internet: http://www.cnsc.ro\n\nVI.4.4)\n\nServiciul de la care se pot ob\u0163ine informa\u0163ii privind procedura de contestare\nDenumire oficial\u0103: Direc\u021Bia juridic\u0103 \u0219i resurse umane\nAdres\u0103: Bulevardul Basarabia nr. 37-39\nLocalitate: Bucure\u0219ti\nCod po\u0219tal: 022103\n\u021Aar\u0103: Rom\xE2nia\nE-mail: c.dima@anad.gov.ro\nTelefon: +40 213115541\nFax: +40 213115541\nAdres\u0103 internet: www.anad.gov.ro\n\nVI.5)\n\nData expedierii prezentului anun\u021B:\n22/02/2021\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n5/5\n```\n"
