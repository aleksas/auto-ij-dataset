    ANAD dorește să achiziționeze servicii de dezvoltare de aplicații și sisteme informatice,
    achiziție pachete

    software și echipamente care vor asigura accesul online la serviciile publice
    de avizare/autorizare gestionate de

    ANAD și va furniza digital fluxurile de lucru asociate proceselor de avizare/autorizare
    din cadrul instituției.

    Achiziția este planificată în cadrul proiectului „Ajustarea legislației relevante
    privind combaterea dopajului

    în sport”, cod My SMIS 130073, cod SIPOCA 740. Proiectul este cofinanțat din Fondul
    social european prin

    Programul Operațional Capacitate Administrativă, Axa prioritară 1 – „Administrație
    publică și sistem judiciar

    eficiente”/Obiectivul specific 1.1 – „Dezvoltarea și introducerea de sisteme și
    standarde comune în administrația

    publică ce optimizează procesele decizionale orientate către cetățeni și mediul
    de afaceri în concordanță cu

    SCAP” (Strategia privind Consolidarea Administrației Publice 2014-2020). Proiectul
    are ca obiectiv general este

    de a îmbunătăți planificarea strategică, a managementului calității și performanței,
    de a sistematiza și simplifica

    fondul activ al legislației Agenției Naționale Anti-Doping.

    Obiectivele specifice ale proiectului sunt:

    1. Imbunătățirea cadrului metodologic privind combaterea dopajului în sport, cu
    accent pe măsuri de

    conștientizare şi prevenire a dopajului în sport prin realizarea, testarea și
    adoptarea a patru metodologii de lucru

    și a unui studiu. Prin acest obiectiv, proiectul propus de ANAD se încadreaza
    în tipurile de acțiuni orientative din

    cadrul ghidului solicitantului „Dezvoltarea de sisteme şi instrumente de management”;

    2. Actualizarea și îmbunatățirea cadrului legislativ pentru implementarea reglementărilor
    internaționale privind

    combaterea dopajului în sport, inclusiv a sistemului de monitorizare a dopajului,
    prevenirea și combaterea

    traficului ilicit de substanțe dopante cu grad mare de risc, definit și dezvoltat
    prin realizarea a cinci inițiative

    legislative în consultare activă publică;

    3. Îmbunătăţirea procesului de management și digitalizarea fluxurilor de lucru
    din cadrul ANAD prin dezvoltarea

    și implementarea unei platforme informatice pentru servicii electronice care va
    asigura accesul online la

    serviciile publice de avizare/autorizare gestionate de ANAD și va furniza digital
    fluxurile de lucru asociate

    proceselor de avizare/autorizare din cadrul instituției;

    4. Imbunătățirea competențelor personalului ANAD prin realizarea unei metodologii
    de formare a personalului și

    derularea a patru programe de formare pentru 49 de angajați ai ANAD.

