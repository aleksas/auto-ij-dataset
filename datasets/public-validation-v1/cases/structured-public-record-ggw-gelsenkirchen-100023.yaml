  content_markdown: "# GGW Gelsenkirchen structural-planning contract extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/de/notice/100023-2021/pdfs\n\n## Listed sources\n- TED notice XML 100023-2021: https://ted.europa.eu/en/notice/100023-2021/xml\n- TED notice PDF 100023-2021 (DE): https://ted.europa.eu/de/notice/100023-2021/pdfs\n- TED notice detail 100023-2021: https://ted.europa.eu/en/notice/-/detail/100023-2021\n\n## Extracted source text\n\n```text\nABl./S S40\n26/02/2021\n100023-2021-DE\n\n1/4\n\nDiese Bekanntmachung auf der TED-Website: https://ted.europa.eu/udl?uri=TED:NOTICE:100023-2021:TEXT:DE:HTML\n\nDeutschland-Gelsenkirchen: Dienstleistungen von Architektur-,\nKonstruktions- und Ingenieurb\xFCros und Pr\xFCfstellen\n2021/S 040-100023\nBekanntmachung vergebener Auftr\xE4ge\nErgebnisse des Vergabeverfahrens\nDienstleistungen\nRechtsgrundlage:\nRichtlinie 2014/24/EU\nAbschnitt I: \xD6ffentlicher Auftraggeber\n\
    I.1)\nName und Adressen\nOffizielle Bezeichnung: GGW Gelsenkirchener Gemeinn\xFCtzige Wohnungsbaugesellschaft mbH\nPostanschrift: Darler Heide 100\nOrt: Gelsenkirchen\nNUTS-Code: DEA32 Gelsenkirchen, Kreisfreie Stadt\nPostleitzahl: 45891\nLand: Deutschland\nE-Mail: pledl@g-g-w.de\nInternet-Adresse(n):\nHauptadresse: https://www.ggw-gelsenkirchen.de\nI.4)\n\nArt des \xF6ffentlichen Auftraggebers\nAndere: Wohnungsbaugesellschaft\n\nI.5)\n\nHauptt\xE4tigkeit(en)\nWohnungswesen und kommunale Einrichtungen\n\nAbschnitt II: Gegenstand\nII.1)\nUmfang der Beschaffung\nII.1.1)\n\nBezeichnung des Auftrags:\nNeubau 3-z\xFCgige Grundschule und Einfeldsporthalle, Ebersteinstra\xDFe, Gelsenkirchen, FPL Tragwerksplanung\nReferenznummer der Bekanntmachung: ESS-03-2020\n\nII.1.2)\n\nCPV-Code Hauptteil\n71000000 Dienstleistungen von Architektur-, Konstruktions- und Ingenieurb\xFCros und Pr\xFCfstellen\n\nII.1.3)\n\nArt des Auftrags\nDienstleistungen\n\nII.1.4)\n\nKurze Beschreibung:\nFachplanungsleistungen\
    \ f\xFCr Tragwerksplanung gem\xE4\xDF Teil 4 Abschnitt 1 HOAI 2013, Leistungsphasen 1-4.\nEs besteht die Option der Beauftragung weiterer Leistungsphasen 5-6.\n\nII.1.6)\n\nAngaben zu den Losen\nAufteilung des Auftrags in Lose: nein\n\nII.1.7)\n\nGesamtwert der Beschaffung (ohne MwSt.)\nWert ohne MwSt.: 234 000.00 EUR\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n1/4\n\nABl./S S40\n26/02/2021\n100023-2021-DE\n\n2/4\n\nII.2)\n\nBeschreibung\n\nII.2.2)\n\nWeitere(r) CPV-Code(s)\n71320000 Planungsleistungen im Bauwesen\n\nII.2.3)\n\nErf\xFCllungsort\nNUTS-Code: DEA32 Gelsenkirchen, Kreisfreie Stadt\nHauptort der Ausf\xFChrung:\nGelsenkirchen\nDEUTSCHLAND\n\nII.2.4)\n\nBeschreibung der Beschaffung:\nFachplanungsleistungen f\xFCr Tragwerksplanung gem\xE4\xDF Teil 4 Abschnitt 1 HOAI 2013, Leistungsphasen 1-4,\n2\n\nf\xFCr den Neubau einer 3-z\xFCgigen Grundschule und Einfeldsporthalle. BGF des Schulgeb\xE4udes ca. 5 700 m .\nPlanungsleistungen auf Basis eines mit der Stadt Gelsenkirchen\
    \ abgestimmten p\xE4dagogischen Konzeptes.\nII.2.5)\n\nZuschlagskriterien\nQualit\xE4tskriterium - Name: Qualit\xE4rskriterien / Gewichtung: 65 %\nPreis - Gewichtung: 35 %\n\nII.2.11)\n\nAngaben zu Optionen\nOptionen: ja\nBeschreibung der Optionen:\nGegenstand des aktuellen Verhandlungsverfahrens ist die Beauftragung der Leistungsphasen 1 bis 4.\nEs besteht die Option der Beauftragung weiterer Leistungen der Leistungsphasen 5 - 6.\n\nII.2.13)\n\nAngaben zu Mitteln der Europ\xE4ischen Union\nDer Auftrag steht in Verbindung mit einem Vorhaben und/oder Programm, das aus Mitteln der EU finanziert\nwird: nein\n\nII.2.14)\n\nZus\xE4tzliche Angaben\n\nAbschnitt IV: Verfahren\nIV.1)\nBeschreibung\nIV.1.1)\n\nVerfahrensart\nVerhandlungsverfahren\nBeschleunigtes Verfahren\nBegr\xFCndung:\nDer neue Schulkomplex soll im August 2022 seinen Betrieb aufnehmen. Deshalb ist die Erarbeitung des\nBauantrages bis 03/2021 und der Baubeginn f\xFCr 06/2021 erforderlich. Aus diesem Grund sind verk\xFCrzte Fristen\n\
    vorgesehen.\n\nIV.1.3)\n\nAngaben zur Rahmenvereinbarung oder zum dynamischen Beschaffungssystem\n\nIV.1.8)\n\nAngaben zum Beschaffungs\xFCbereinkommen (GPA)\nDer Auftrag f\xE4llt unter das Beschaffungs\xFCbereinkommen: ja\n\nIV.2)\n\nVerwaltungsangaben\n\nIV.2.1)\n\nFr\xFChere Bekanntmachung zu diesem Verfahren\nBekanntmachungsnummer im ABl.: 2020/S 227-557798\n\nIV.2.8)\n\nAngaben zur Beendigung des dynamischen Beschaffungssystems\n\nIV.2.9)\n\nAngaben zur Beendigung des Aufrufs zum Wettbewerb in Form einer Vorinformation\n\nAbschnitt V: Auftragsvergabe\nAuftrags-Nr.: 2021100918\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n2/4\n\nABl./S S40\n26/02/2021\n100023-2021-DE\n\n3/4\n\nBezeichnung des Auftrags:\nNeubau 3-z\xFCgige Grundschule und Einfeldsporthalle, Ebersteinstra\xDFe, Gelsenkirchen, FPL Tragwerksplanung\nEin Auftrag/Los wurde vergeben: ja\nV.2)\n\nAuftragsvergabe\n\nV.2.1)\n\nTag des Vertragsabschlusses:\n28/01/2021\n\nV.2.2)\n\nAngaben zu den Angeboten\nAnzahl der eingegangenen\
    \ Angebote: 2\nAnzahl der eingegangenen Angebote von KMU: 1\nAnzahl der eingegangenen Angebote von Bietern aus anderen EU-Mitgliedstaaten: 0\nAnzahl der eingegangenen Angebote von Bietern aus Nicht-EU-Mitgliedstaaten: 0\nAnzahl der elektronisch eingegangenen Angebote: 2\nDer Auftrag wurde an einen Zusammenschluss aus Wirtschaftsteilnehmern vergeben: nein\n\nV.2.3)\n\nName und Anschrift des Wirtschaftsteilnehmers, zu dessen Gunsten der Zuschlag erteilt wurde\nOffizielle Bezeichnung: Br\xF6ckling Vullhorst Ingenieure GmbH\nPostanschrift: Josef-F\xF6rster-Stra\xDFe 4\nOrt: H\xF6velhof\nNUTS-Code: DEA47 Paderborn\nPostleitzahl: 33161\nLand: Deutschland\nE-Mail: info@bv-ingenieure.de\nDer Auftragnehmer ist ein KMU: ja\n\nV.2.4)\n\nAngaben zum Wert des Auftrags/Loses (ohne MwSt.)\nGesamtwert des Auftrags/Loses: 116 274.92 EUR\n\nV.2.5)\n\nAngaben zur Vergabe von Unterauftr\xE4gen\n\nAbschnitt VI: Weitere Angaben\nVI.3)\nZus\xE4tzliche Angaben:\nVI.4)\n\nRechtsbehelfsverfahren/Nachpr\xFCfungsverfahren\n\
    \nVI.4.1)\n\nZust\xE4ndige Stelle f\xFCr Rechtsbehelfs-/Nachpr\xFCfungsverfahren\nOffizielle Bezeichnung: Vergabekammer Westfalen\nPostanschrift: Albrecht-Thaer-Stra\xDFe 9\nOrt: M\xFCnster\nPostleitzahl: 48147\nLand: Deutschland\nE-Mail: vergabekammer@brms.nrw.de\nTelefon: +49 251-4111691\nFax: +49 251-4112165\n\nVI.4.3)\n\nEinlegung von Rechtsbehelfen\nGenaue Angaben zu den Fristen f\xFCr die Einlegung von Rechtsbehelfen:\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n3/4\n\nABl./S S40\n26/02/2021\n100023-2021-DE\n\n4/4\n\nNach \xA7 160 Abs. 3 Satz 1 Nr. 1 bis 4 GWB ist der Antrag auf Einleitung eines Nachpr\xFCfungsverfahrens\nunzul\xE4ssig, soweit:\n1) der Antragsteller den geltend gemachten Versto\xDF gegen Vergabevorschriften vor Einreichen des\nNachpr\xFCfungsantrags erkannt und gegen\xFCber dem Auftraggeber nicht innerhalb einer Frist von 10\nKalendertagen ger\xFCgt hat; der Ablauf der Frist nach \xA7 134 Absatz 2 GWB bleibt unber\xFChrt,\n2) Verst\xF6\xDFe gegen Vergabevorschriften,\
    \ die aufgrund der Bekanntmachung erkennbar sind, nicht sp\xE4testens bis\nzum Ablauf der in der Bekanntmachung benannten Frist zur Bewerbung oder zur Angebotsabgabe gegen\xFCber\ndem Auftraggeber ger\xFCgt werden,\n3) Verst\xF6\xDFe gegen Vergabevorschriften, die erst in den Vergabeunterlagen erkennbar sind, nicht sp\xE4testens bis\nzum Ablauf der Frist zur Bewerbung oder zur Angebotsabgabe gegen\xFCber dem Auftraggeber ger\xFCgt werden,\n4) mehr als 15 Kalendertage nach Eingang der Mitteilung des Auftraggebers, einer R\xFCge nicht abhelfen zu\nwollen, vergangen sind.\nVI.5)\n\nTag der Absendung dieser Bekanntmachung:\n22/02/2021\n\n26/02/2021\nS40\nhttps://ted.europa.eu/TED\n\n4/4\n```\n"
