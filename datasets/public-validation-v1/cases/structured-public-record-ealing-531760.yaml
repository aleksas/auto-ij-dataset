  content_markdown: "# Ealing High Lane Estate regeneration contract extraction\n\nCollected from the official TED procurement PDF on 2026-03-20.\n\nPrimary source URL: https://ted.europa.eu/en/notice/531760-2019/pdfs\n\n## Listed sources\n- TED notice PDF 531760-2019: https://ted.europa.eu/en/notice/531760-2019/pdfs\n- TED notice HTML 531760-2019: https://ted.europa.eu/udl?uri=TED:NOTICE:531760-2019:TEXT:EN:HTML\n\n## Extracted source text\n\n```text\nOJ/S S217\n11/11/2019\n531760-2019-EN\n\nWorks - Contract award notice - Competitive dialogue\n\n1/3\n\nThis notice in TED website: https://ted.europa.eu/udl?uri=TED:NOTICE:531760-2019:TEXT:EN:HTML\n\nUnited Kingdom-Ealing: Construction work\n2019/S 217-531760\nContract award notice\nResults of the procurement procedure\nWorks\nLegal Basis:\nDirective 2014/24/EU\nSection I: Contracting authority\nI.1)\nName and addresses\nOfficial name: London Borough of Ealing\nPostal address: 3rd Floor Perceval House, 14-16 Uxbridge Road\nTown: Ealing\n\
    NUTS code: UK\nPostal code: W5 2HL\nCountry: United Kingdom\nContact person: Miss Sarah Hadland\nE-mail: hadlands@ealing.gov.uk\nTelephone: +44 2088255000\nInternet address(es):\nMain address: http://www.ealing.gov.uk\nAddress of the buyer profile: http://www.ealing.gov.uk\nI.2)\n\nInformation about joint procurement\n\nI.4)\n\nType of the contracting authority\nRegional or local authority\n\nI.5)\n\nMain activity\nGeneral public services\n\nSection II: Object\nII.1)\nScope of the procurement\nII.1.1)\n\nTitle:\nHigh Lane Estate Regeneration \u2014 1189\nReference number: DN121762\n\nII.1.2)\n\nMain CPV code\n45000000\n\nII.1.3)\n\nType of contract\nWorks\n\nII.1.4)\n\nShort description:\nThe London Borough of Ealing has appointed a development partner to completely redevelop the High Lane\nestate.\n\n11/11/2019\nS217\nhttps://ted.europa.eu/\nTED\n\nWorks - Contract award notice - Competitive dialogue\nSupplement to the Official Journal of the European Union\n\n1/3\n\nOJ/S S217\n11/11/2019\n\
    531760-2019-EN\n\nWorks - Contract award notice - Competitive dialogue\n\n2/3\n\nII.1.6)\n\nInformation about lots\nThis contract is divided into lots: no\n\nII.1.7)\n\nTotal value of the procurement (excluding VAT)\nValue excluding VAT: 99 000 000.00 GBP\n\nII.2)\n\nDescription\n\nII.2.1)\n\nTitle:\n\nII.2.2)\n\nAdditional CPV code(s)\n\nII.2.3)\n\nPlace of performance\nNUTS code: UK\n\nII.2.4)\n\nDescription of the procurement:\nThe London Borough of Ealing has appointed a development partner to completely redevelop the High Lane\nestate. The development partner will secure scheme financing, produce their own development proposals\n(having regard to the planning guidance provided) submit a planning application, demolish and build the new\nhomes on a phased basis, with the Council purchasing a required amount of affordable housing.In return for the\nconstruction of housing to be retained by the Council (or transferred to the Council or its nominated purchaser\nwhere appropriate) for\
    \ replacement housing (both social and housing to be offered at a discount market rent),\nland will be provided to enable the development partner to construct market housing. At the request of the\nCouncil, a proportion of the replacement housing (i.e. that to be offered at a discount to market rent) will be\ntransferred to Broadway Living, a wholly owned subsidiary of the Council.\nThe development and construction risk will be taken by the developer, notwithstanding obligations of both a\ncontractual and statutory nature upon the Council and the clear intention of the Council to enter agreement with\nthe Developer on a partnership basis.\n\nII.2.5)\n\nAward criteria\nQuality criterion - Name: Quality / Weighting: 40\nPrice - Weighting: 60\n\nII.2.11)\n\nInformation about options\nOptions: no\n\nII.2.13)\n\nInformation about European Union funds\nThe procurement is related to a project and/or programme financed by European Union funds: no\n\nII.2.14)\n\nAdditional information\n\nSection\
    \ IV: Procedure\nIV.1)\nDescription\nIV.1.1)\n\nType of procedure\nCompetitive dialogue\n\nIV.1.3)\n\nInformation about a framework agreement or a dynamic purchasing system\n\nIV.1.6)\n\nInformation about electronic auction\n\nIV.1.8)\n\nInformation about the Government Procurement Agreement (GPA)\nThe procurement is covered by the Government Procurement Agreement: no\n\nIV.2)\n\nAdministrative information\n\nIV.2.1)\n\nPrevious publication concerning this procedure\nNotice number in the OJ S: 2016/S 061-102828\n\nIV.2.8)\n\nInformation about termination of dynamic purchasing system\n\n11/11/2019\nS217\nhttps://ted.europa.eu/\nTED\n\nWorks - Contract award notice - Competitive dialogue\nSupplement to the Official Journal of the European Union\n\n2/3\n\nOJ/S S217\n11/11/2019\n531760-2019-EN\n\nIV.2.9)\n\nWorks - Contract award notice - Competitive dialogue\n\n3/3\n\nInformation about termination of call for competition in the form of a prior information notice\n\nSection V: Award of contract\n\
    Title:\nHigh Lane Estate Regeneration \u2014 1189\nA contract/lot is awarded: yes\nV.2)\n\nAward of contract\n\nV.2.1)\n\nDate of conclusion of the contract:\n08/10/2019\n\nV.2.2)\n\nInformation about tenders\nNumber of tenders received: 3\nNumber of tenders received from tenderers from other EU Member States: 0\nNumber of tenders received from tenderers from non-EU Member States: 0\nNumber of tenders received by electronic means: 3\nThe contract has been awarded to a group of economic operators: no\n\nV.2.3)\n\nName and address of the contractor\nOfficial name: Rydon Group Ltd\nPostal address: Rydon House, Station Road, Forest Row\nTown: East Grinstead\nNUTS code: UK\nPostal code: RH18 5DW\nCountry: United Kingdom\nThe contractor is an SME: no\n\nV.2.4)\n\nInformation on value of the contract/lot (excluding VAT)\nTotal value of the contract/lot: 99 000 000.00 GBP\n\nV.2.5)\n\nInformation about subcontracting\n\nSection VI: Complementary information\nVI.3)\nAdditional information:\n\
    VI.4)\n\nProcedures for review\n\nVI.4.1)\n\nReview body\nOfficial name: London Borough of Ealing\nPostal address: Perceval House, 14-16 Uxbridge Road\nTown: Ealing\nPostal code: W5 2HL\nCountry: United Kingdom\n\nVI.4.2)\n\nBody responsible for mediation procedures\n\nVI.4.3)\n\nReview procedure\n\nVI.4.4)\n\nService from which information about the review procedure may be obtained\n\nVI.5)\n\nDate of dispatch of this notice:\n07/11/2019\n\n11/11/2019\nS217\nhttps://ted.europa.eu/\nTED\n\nWorks - Contract award notice - Competitive dialogue\nSupplement to the Official Journal of the European Union\n\n3/3\n```\n"
